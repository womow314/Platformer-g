<!DOCTYPE html>
<html>

<head>

    <title>Multiplayer Platform Tag</title>

    <link rel="stylesheet" href="styles1.css" />

</head>

<body>
    <button onclick="home()" id="home">Home</button>
    <h1 id="admin"></h1>
    <h2 id="score"></h2>

    <canvas id="game" width="800" height="500"></canvas>

    <script src="/socket.io/socket.io.js"></script>

    <div id="mobileControls">
        <button id="left">←</button>
        <button id="right">→</button>
        <button id="up">ꜛ</button>
        <button id="down">↓</button>

    </div>

    <script>
        const keys = {};
        function bindButton(id, key) {
            const btn = document.getElementById(id);

            function press(e) {
                e.preventDefault();
                keys[key] = true;
            }

            function release(e) {
                e.preventDefault();
                keys[key] = false;
            }

            btn.addEventListener("touchstart", press, { passive: false });
            btn.addEventListener("touchend", release, { passive: false });
            btn.addEventListener("touchcancel", release, { passive: false });

            btn.addEventListener("mousedown", press);
            btn.addEventListener("mouseup", release);
            btn.addEventListener("mouseleave", release);
        }


        bindButton("left", "a");
        bindButton("right", "d");
        bindButton("up", "w");
        bindButton("down", "s");
        function home() {
            window.location.href = "index.html";
        }
        setInterval(() => {
            let scorePanel = document.getElementById('score');
            scorePanel.innerText = '';

            for (let id in gravityPlayers) {
                let player = gravityPlayers[id];
                scorePanel.innerText += `${player.name}: ${player.timeIT}\n`;
            }
        }, 50);

        setInterval(() => {
            for (let plat of platforms) {
                if (Math.random() < 0.2) {
                    plat.b = true
                } else {
                    plat.b = false
                }
            }
        }, 10000);

        const socket = io();
        socket.emit("joinTagSide", "side");

        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");

        const brick = new Image();
        brick.src = "images/pixil-frame-0 (4).png";

        const slime = new Image();
        slime.src = "images/pixil-frame-0%20(11).png"



        let gravityPlayers = {};
        let platforms = []
        function addPlatform(px, py, w, h, isBouncy = false) {
            platforms.push({
                x: px,
                y: py,
                width: w,
                height: h,
                b: isBouncy
            });
        }

        let myX = 400;
        let myY = 250;

        function ban(name) {
            socket.emit("ban", name)
        }


        socket.on("connect", () => {

            console.log("Connected!");
            let playerName = prompt("Enter your name:");

            if (!playerName || playerName.trim() === "") {
                playerName = "Player";
            }

            socket.emit("setName", playerName);

        });
        socket.on("kicked", () => {
            alert("You have been kicked from the game.");
            window.location.href = "index.html";
        });


        socket.on("players", (data) => {

            gravityPlayers = data;

        });

        document.addEventListener("keydown", (e) => {

            keys[e.key.toLowerCase()] = true;

        });

        document.addEventListener("keyup", (e) => {

            keys[e.key.toLowerCase()] = false;

        });
        let speed = 4;
        addPlatform(0, 470, 800, 30);
        addPlatform(80, 400, 130, 30);
        addPlatform(320, 330, 130, 30);
        addPlatform(580, 400, 130, 30);
        addPlatform(80, 250, 130, 30);
        addPlatform(320, 180, 130, 30);
        addPlatform(580, 250, 130, 30);
        addPlatform(80, 100, 130, 30);
        addPlatform(580, 100, 130, 30);
        let player = {
            x: 0,
            y: 0,
            width: 30,
            height: 30,
            dy: 0,
            grounded: false
        }
        let gravity = 0.8

        function update() {
            if ((keys["w"] || keys["Space"]) && player.grounded) {
                player.dy = -15
            }
            player.grounded = false
            myY += player.dy
            player.dy += gravity

            if (keys["a"]) myX -= speed;
            if (keys["d"]) myX += speed;
            player.x = myX;
            player.y = myY;

            for (let plat of platforms) {
                if (player.x < plat.x + plat.width &&
                    player.x + player.width > plat.x &&
                    player.y < plat.y + plat.height &&
                    player.y + player.height > plat.y && !keys['ArrowDown']) {
                    if (player.dy > 0 && player.y + player.height - player.dy <= plat.y) {
                        myY = plat.y - player.height;
                        player.dy = 0;
                        player.grounded = true;
                        if (plat.b) {
                            player.dy = -20
                        }
                    }


                }
            }


            myX = Math.max(0, Math.min(canvas.width - 30, myX));


            socket.emit("move", {
                x: myX,
                y: myY
            });

        }
        const imageCache = {};

        function loadImage(src) {
            if (!imageCache[src]) {
                imageCache[src] = new Image();
                imageCache[src].src = src;
            }

            return imageCache[src];
        }

        function draw() {

            ctx.fillStyle = "#87CEEB";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            platforms.forEach(plat => {
                for (let l = 0; l < plat.width; l += 10) {
                    if (plat.b) {
                        ctx.drawImage(slime, plat.x + l, plat.y, 10, plat.height);
                    } else {
                        ctx.drawImage(brick, plat.x + l, plat.y, 10, plat.height);
                    }
                }
            });

            for (let id in gravityPlayers) {

                const p = gravityPlayers[id];

                const img = loadImage(p.color);
                if (p.facing === "down") continue;

                if (img.complete) {
                    ctx.drawImage(img, p.x, p.y, 30, 30);
                }

                if (p.it) {

                    ctx.strokeStyle = "red";
                    ctx.lineWidth = 4;
                    ctx.strokeRect(p.x - 2, p.y - 2, 34, 34);

                }

                ctx.fillStyle = "black";
                ctx.font = "12px Arial";
                ctx.fillText(p.name, p.x, p.y - 5);

            }

        }

        function gameLoop() {

            update();
            draw();

            requestAnimationFrame(gameLoop);

        }

        gameLoop();

    </script>

</body>

</html>
