<!DOCTYPE html>
<html>

<head>
    <title>Halo Terrain FPS</title>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;
        }

        canvas {
            display: block;
        }

        #info {
            position: fixed;
            top: 10px;
            left: 10px;
            color: white;
            font-family: Arial;
            background: rgba(0, 0, 0, .5);
            padding: 10px;
        }

        #plus {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            padding: 0;
            font-size: 70px;
        }
    </style>
    <link rel="stylesheet" href="styles1.css" />
</head>

<body>
    <button onclick="home()" id="home">Home</button>

    <div id="info">
        WASD Move<br>
        Shift Sprint<br>
        Mouse Look<br>
        Space Jump<br>
        Q switch guns
    </div>

    <span id="plus">O</p>


        <script type="importmap">
        {
          "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
          }
        }
        </script>
        <script>
            function home() {
                window.location.href = "index.html";
            }
        </script>

        <script type="module">
            import * as THREE from "three";
            import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

            // Put ALL of your JavaScript here.
            const gltfLoader = new GLTFLoader();




            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x74b0c8);

            const loader = new THREE.TextureLoader();


            let camera = new THREE.PerspectiveCamera(
                90,
                innerWidth / innerHeight,
                0.1,
                1000
            );


            const renderer = new THREE.WebGLRenderer({
                antialias: true
            });

            renderer.setSize(
                innerWidth,
                innerHeight
            );

            renderer.shadowMap.enabled = true;

            document.body.appendChild(renderer.domElement);



            // LIGHT

            const sun = new THREE.DirectionalLight(
                0xffffff,
                2
            );

            sun.position.set(
                100,
                200,
                100
            );

            sun.castShadow = true;

            scene.add(sun);

            scene.add(
                new THREE.AmbientLight(
                    0xffffff,
                    0.3
                )
            );



            // TERRAIN HEIGHT FUNCTION
            const multiply = 6

            const m1 = Math.random() * multiply
            const m2 = Math.random() * multiply
            const m3 = Math.random() * multiply
            const m4 = Math.random() * multiply


            function getHeight(x, z) {

                return (
                    Math.sin(x * .02) * 8 * m1 +
                    Math.cos(z * .025) * 8 * m2 +
                    Math.sin((x + z) * .01) * 15 * m3 +
                    Math.sin(x * .004) * Math.cos(z * .006) * 35 * m4
                );

            }

            const platMat = [
                new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (53).png") }),
                new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (53).png") }),
                new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (52).png") }),
                new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (52).png") }),
                new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (53).png") }),
                new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (53).png") }),
            ];
            const targetMAT = [
                new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (71).png") }),
                new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (71).png") }),
                new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (71).png") }),
                new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (71).png") }),
                new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (71).png") }),
                new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (71).png") }),
            ];
            const ironMAT = [
                new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (70).png") }),
                new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (70).png") }),
                new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (70).png") }),
                new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (70).png") }),
                new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (70).png") }),
                new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (70).png") }),
            ];

            const bullet = [
                new THREE.MeshStandardMaterial({ map: loader.load("images/Screen Shot 2026-05-04 at 2.50.58 PM.png") }),
                new THREE.MeshStandardMaterial({ map: loader.load("images/Screen Shot 2026-05-04 at 2.50.58 PM.png") }),
                new THREE.MeshStandardMaterial({ map: loader.load("images/Screen Shot 2026-05-04 at 2.50.58 PM.png") }),
                new THREE.MeshStandardMaterial({ map: loader.load("images/Screen Shot 2026-05-04 at 2.50.58 PM.png") }),
                new THREE.MeshStandardMaterial({ map: loader.load("images/Screen Shot 2026-05-04 at 2.50.58 PM.png") }),
                new THREE.MeshStandardMaterial({ map: loader.load("images/Screen Shot 2026-05-04 at 2.50.58 PM.png") })
            ];

            let platforms = []
            let bullets = []

            const spawnPlatform = (x, y, z, width = 5, height = 1, depth = 5, iron = false) => {
                let p;

                if (!iron) {
                    p = new THREE.Mesh(new THREE.BoxGeometry(width, height, depth), platMat);
                } else {
                    p = new THREE.Mesh(new THREE.BoxGeometry(width, height, depth), ironMAT);
                }

                p.position.set(x, y, z);

                scene.add(p);       // instead of scene.add(p)

                p.width = width;
                p.height = height;
                p.depth = depth;

                platforms.push(p);
            };

            let targets = []

            function spawnTarget(x, y, z) {

                gltfLoader.load("Models/enemy.glb", function (gltf) {

                    const enemy = gltf.scene;

                    enemy.position.set(x, y, z);
                    enemy.rotation.y = Math.PI / 2
                    enemy.health = 1

                    enemy.scale.set(0.2, 0.2, 0.2); // adjust size if needed

                    scene.add(enemy);

                    targets.push(enemy);

                });

            }
            function spawnTree(x, z) {

                gltfLoader.load("Models/tree (1).glb", function (gltf) {

                    const tree = gltf.scene;

                    tree.position.set(x, terrainHeight(x,z)-1, z);
                    tree.rotation.y = 1

                    tree.scale.set(1, 1, 1); // adjust size if needed

                    scene.add(tree);


                });

            }
            spawnTree(-200, 50)


            spawnPlatform(-10, 6, 10, 80, 1, 30)
            spawnPlatform(-10, 2, -5, 80, 32, 1, true)
            spawnPlatform(-10, -2, 25, 80, 38, 1, true)
            for (let i = 0; i < 30; i++) {
                spawnPlatform(-30 * i - 60, -6, 10, 8, 38, 8, true)
            }

            function playerHitsPlatform(p) {

                const withinX =
                    player.x >= p.position.x - p.width / 2 - 0.5 &&
                    player.x <= p.position.x + p.width / 2 + 0.5;


                const withinZ =
                    player.z >= p.position.z - p.depth / 2 - 0.5 &&
                    player.z <= p.position.z + p.depth / 2 + 0.5;


                const feet = player.y - player.height;


                const topOfPlatform =
                    p.position.y + p.height / 2;


                const hittingTop =
                    feet <= topOfPlatform &&
                    feet >= topOfPlatform - 2;


                return withinX && withinZ && hittingTop;

            }




            // TERRAIN

            const size = 2000;
            const segments = 100;
            let gun = "assult"


            const geo = new THREE.PlaneGeometry(
                size,
                size,
                segments,
                segments
            );


            const verts = geo.attributes.position;


            for (let i = 0; i < verts.count; i++) {

                let x = verts.getX(i);
                let z = verts.getY(i);


                verts.setZ(
                    i,
                    getHeight(x, z)
                );

            }



            geo.computeVertexNormals();

            const grass = new THREE.MeshStandardMaterial({
                map: loader.load("images/pixil-frame-0 (69).png")
            });


            const terrain = new THREE.Mesh(
                geo,
                grass
            );


            // keep terrain aligned with collision

            terrain.rotation.x = -Math.PI / 2;

            terrain.updateMatrixWorld(true);

            scene.add(terrain);



            // PLAYER

            const player = {

                x: 0,

                z: -15,

                y: 50,

                height: 3,

                speed: .5,

                velocityY: 0,

                grounded: false

            };
            let yaw = 0;
            let pitch = 0;


            const gravity = -.025;
            const jump = .8;
            let guns = ["assult", "snipe"]
            function fire() {
                if (gun === "assult") {
                    let p = new THREE.Mesh(
                        new THREE.BoxGeometry(0.6, 0.6, 0.6),
                        bullet
                    );

                    p.position.copy(camera.position);

                    const dir = new THREE.Vector3();
                    camera.getWorldDirection(dir);

                    p.dx = dir.x + Math.random() / 10 - 0.05;
                    p.dy = dir.y + Math.random() / 10 - 0.05;
                    p.dz = dir.z + Math.random() / 10 - 0.05;
                    p.damage = 0.2
                    p.type = "assult"

                    scene.add(p);
                    bullets.push(p);
                } else if (gun === "snipe") {
                    let p = new THREE.Mesh(
                        new THREE.BoxGeometry(1, 1, 1),
                        bullet
                    );

                    p.position.copy(camera.position);

                    const dir = new THREE.Vector3();
                    camera.getWorldDirection(dir);

                    p.dx = dir.x
                    p.dy = dir.y
                    p.dz = dir.z
                    p.damage = 1
                    p.type = "snipe"

                    scene.add(p);
                    bullets.push(p);
                }
            }



            // MOUSE LOOK





            renderer.domElement.onclick = () => {

                renderer.domElement.requestPointerLock();

            };

            let isZoomed = false
            let isFiring = false

            window.addEventListener('mousedown', (event) => {
                if (event.button === 2) {
                    isZoomed = true
                }
                if (event.button === 0) {
                    isFiring = true
                }
            });

            window.addEventListener('mouseup', (event) => {
                if (event.button === 2) {
                    isZoomed = false

                }
                if (event.button === 0) {
                    isFiring = false
                }
            });


            let sensitivity = 0.002
            document.addEventListener(
                "mousemove",
                e => {

                    if (document.pointerLockElement !== renderer.domElement)
                        return;


                    yaw -= e.movementX * sensitivity;

                    pitch -= e.movementY * sensitivity;


                    pitch = Math.max(
                        -1.5,
                        Math.min(1.5, pitch)
                    );

                });



            // INPUT


            let keys = {};


            addEventListener(
                "keydown",
                e => {
                    keys[e.code] = true;
                    if (keys.KeyQ) {
                        if (gun === "assult") {
                            gun = "snipe"
                            document.getElementById("plus").style.fontSize = "10px"
                        } else if (gun === "snipe") {
                            gun = "assult"
                            document.getElementById("plus").style.fontSize = "70px"

                        }
                    }
                });



            addEventListener(
                "keyup",
                e => {
                    keys[e.code] = false;
                });





            // TERRAIN COLLISION


            const raycaster = new THREE.Raycaster();


            function terrainHeight(x, z) {


                raycaster.set(
                    new THREE.Vector3(x, 200, z),
                    new THREE.Vector3(0, -1, 0)
                );


                let hit =
                    raycaster.intersectObject(
                        terrain
                    );


                if (hit.length) {

                    return hit[0].point.y;

                }


                return -100;

            }



            function canMove(x, z) {

                let current =
                    terrainHeight(
                        player.x,
                        player.z
                    );


                let next =
                    terrainHeight(
                        x,
                        z
                    );


                // prevent walking into cliffs

                if (next - current > 1.5)
                    return false;


                return true;

            }



            function updateGround() {

                let ground =
                    terrainHeight(
                        player.x,
                        player.z
                    );



                if (player.y - player.height <= ground) {

                    player.y =
                        ground + player.height;

                    player.velocityY = 0;

                    player.grounded = true;

                }
                else {

                    player.grounded = false;

                }

            }
            setInterval(() => {
                let x = -1000
                let z = player.z + Math.random() * 2000 - 1000

                spawnTarget(x, 0, z)

            }, 2000);





            // GAME LOOP

            let maxCooldown = 2.5
            let cooldown = 0


            function animate() {

                requestAnimationFrame(
                    animate
                );
                let bulletSpeed = 50


                camera.fov = isZoomed ? 15 : 90;
                camera.updateProjectionMatrix();
                sensitivity = 0.002
                if (isZoomed) {
                    sensitivity = 0.0005
                }
                for (let bullet of bullets) {

                    const oldPos = bullet.position.clone();

                    bullet.position.x += bullet.dx * bulletSpeed;
                    bullet.position.y += bullet.dy * bulletSpeed;
                    bullet.position.z += bullet.dz * bulletSpeed;

                    const direction = new THREE.Vector3()
                        .subVectors(bullet.position, oldPos);

                    const raycaster = new THREE.Raycaster(
                        oldPos,
                        direction.clone().normalize(),
                        0,
                        direction.length()
                    );

                    const hits = raycaster.intersectObjects(targets);

                    if (hits.length > 0) {

                        let target = hits[0].object;

                        // Go up until we find the object stored in targets[]
                        while (target && !targets.includes(target)) {
                            target = target.parent;
                        }

                        if (target) {
                            target.health -= bullet.damage
                            if (target.health <= 0) {
                                scene.remove(target);

                                const index = targets.indexOf(target);
                                if (index !== -1) {
                                    targets.splice(index, 1);
                                }
                            }
                        }

                        scene.remove(bullet);

                        const bulletIndex = bullets.indexOf(bullet);
                        if (bulletIndex !== -1) {
                            bullets.splice(bulletIndex, 1);
                        }
                    }
                    let dist = Math.sqrt((player.x - bullet.position.x) * (player.x - bullet.position.x) + (player.z - bullet.position.z) * (player.z - bullet.position.z))
                    if (dist > 1500) {
                        bullets.splice(bullets.indexOf(bullet), 1)
                    }
                }

                let speed = player.speed;

                if (gun === "assult") {
                    maxCooldown = 2.5
                } else if (gun === "snipe") {
                    maxCooldown = 50
                }


                if (keys.ShiftLeft || keys.ShiftRight)
                    speed *= 2;



                let mx = 0;
                let mz = 0;



                let fx = Math.sin(yaw);
                let fz = Math.cos(yaw);



                if (keys.KeyW) {

                    mx -= fx;
                    mz -= fz;

                }


                if (keys.KeyS) {

                    mx += fx;
                    mz += fz;

                }

                cooldown -= 1
                if (cooldown < 0 && isFiring) {
                    fire()
                    cooldown = maxCooldown
                }


                if (keys.KeyA) {

                    mx -= Math.cos(yaw);
                    mz += Math.sin(yaw);

                }


                if (keys.KeyD) {

                    mx += Math.cos(yaw);
                    mz -= Math.sin(yaw);

                }



                let len = Math.sqrt(
                    mx * mx + mz * mz
                );


                if (len) {

                    mx /= len;
                    mz /= len;

                }

                for (let target of targets) {
                    const speed = 0.5
                    let dist = Math.sqrt((player.x - target.position.x) * (player.x - target.position.x) + (player.z - target.position.z) * (player.z - target.position.z))
                    let dx = (player.x - target.position.x) / dist * speed
                    let dz = (player.z - target.position.z) / dist * speed
                    target.position.x += dx
                    target.position.z += dz
                    target.position.y = terrainHeight(target.position.x, target.position.z) - 2
                }





                let nx =
                    player.x + mx * speed;


                let nz =
                    player.z + mz * speed;



                if (canMove(nx, player.z))
                    player.x = nx;


                if (canMove(player.x, nz))
                    player.z = nz;

                // gravity

                player.velocityY += gravity;
                player.y += player.velocityY;


                // terrain collision

                updateGround();


                // platform collision

                platforms.forEach(p => {

                    if (playerHitsPlatform(p) && player.velocityY <= 0) {

                        player.y =
                            p.position.y +
                            p.height / 2 +
                            player.height;

                        player.velocityY = 0;

                        player.grounded = true;

                    }

                });



                // jump

                if (keys.Space && player.grounded) {

                    player.velocityY = jump;
                    player.grounded = false;

                }




                camera.position.set(
                    player.x,
                    player.y,
                    player.z
                );


                camera.rotation.order = "YXZ";

                camera.rotation.y = yaw;

                camera.rotation.x = pitch;



                renderer.render(
                    scene,
                    camera
                );

            }


            animate();





            addEventListener(
                "resize",
                () => {

                    camera.aspect =
                        innerWidth / innerHeight;

                    camera.updateProjectionMatrix();

                    renderer.setSize(
                        innerWidth,
                        innerHeight
                    );

                });

        </script>

</body>

</html>
