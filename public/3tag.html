<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D | Games.io</title>
    <link rel="stylesheet" href="styles1.css" />
    <style>

            margin: 0;
            overflow: hidden;
            background-color: #87CEEB;
        }

        canvas {
            display: block;
        }

        #instructions {
            position: absolute;
            top: 10px;

            border-radius: 5px;
        }
    </style>
    <button onclick="home()" id="home">Home</button>
    <div id="mobileControls">
        <button id="left">←</button>
        <button id="right">→</button>
        <button id="up">ꜛ</button>
        <button id="jump">⤒</button>
    </div>
    <h2 id="itStatus"></h2>
    <div id="playerList">
        <h3>Players Online (<span id="playerCount">0</span>)</h3>
        <ul id="playersOnline"></ul>
    </div>Í

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>

<body>

    <div id="instructions">
        <strong>Controls:</strong><br>
        Move: Up arrow/Down<br>
        Turn: Left/right arrow
        Jump: Spacebar
    </div>

    <script>
        function home() {
            window.location.href = "index.html";
        }
        const loader = new THREE.TextureLoader();
        const scene = new THREE.Scene();
        //scene.background = new THREE.Color(0x87CEEB);
        scene.background = new THREE.Color(0x74b0c8);
        //scene.background = loader.load("images/pixil-frame-0 (3).png")

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 15);
        scene.add(dirLight);

        const white = new THREE.MeshBasicMaterial({
            color: 0xffffff
        });

        const socket = io();
        socket.emit("joinTag3", "");

        function ban(name) {
            socket.emit("ban", name)
        }

        socket.on("connect", () => {

            console.log("Connected!");
            let playerName = prompt("Enter your name:");

            if (!playerName || playerName.trim() === "") {
                playerName = "Player";
            }

            socket.emit("setName", playerName);

        });

        socket.on("playerMove", (data) => {
            if (!players3d[data.id]) return;

            players3d[data.id].x = data.x;
            players3d[data.id].y = data.y;
            players3d[data.id].z = data.z;
            players3d[data.id].it = data.it;
        });
        socket.on("kicked", () => {
            alert("You have been kicked from the game. Please rejoin.");
            window.location.href = "index.html";
        });

        const otherPlayers = {};

        const waterMat = new THREE.MeshStandardMaterial({
            map: loader.load("images/pixil-frame-0 (6).png"),
            transparent: true,
            opacity: 0.5
        });

        function createNameTag(name) {
            const canvas = document.createElement("canvas");
            canvas.width = 256;
            canvas.height = 64;

            const ctx = canvas.getContext("2d");
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.font = "bold 28px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            ctx.strokeStyle = "black";
            ctx.lineWidth = 5;
            ctx.fillStyle = "white";

            ctx.strokeText(name, 128, 32);
            ctx.fillText(name, 128, 32);

            const texture = new THREE.CanvasTexture(canvas);
            texture.minFilter = THREE.LinearFilter;
            texture.magFilter = THREE.LinearFilter;

            const material = new THREE.SpriteMaterial({
                map: texture,
                transparent: true,
                depthTest: false
            });

            const sprite = new THREE.Sprite(material);
            sprite.scale.set(3, 0.75, 1);
            sprite.position.set(0, 2.2, 0);

            return sprite;
        }

        const itMat = new THREE.MeshStandardMaterial({
            color: 0xff0000
        });
        const platMat = [
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (53).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (53).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (52).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (52).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (53).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (53).png") }),
        ];
        const platMatCrack = [
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (4).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (4).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (56).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (56).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (4).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (4).png") }),
        ];
        const bouncy = [
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (54).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (54).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (54).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (54).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (54).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (54).png") }),
        ];
        const lavalMat = [
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (5).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (5).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (5).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (5).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (5).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (5).png") }),
        ];
        const platforms = [];

        const group1 = new THREE.Group();
        const group2 = new THREE.Group();
        const group3 = new THREE.Group();
        const group4 = new THREE.Group();

        scene.add(group1);
        scene.add(group2);
        scene.add(group3);
        scene.add(group4);
        const spawnPlatform = (group, x, y, z, width = 5, height = 1, depth = 5, crack = false) => {
            let p;

            if (!crack) {
                p = new THREE.Mesh(new THREE.BoxGeometry(width, height, depth), platMat);
            } else {
                p = new THREE.Mesh(new THREE.BoxGeometry(width, height, depth), platMatCrack);
            }

            p.position.set(x, y, z);

            group.add(p);       // instead of scene.add(p)

            p.width = width;
            p.height = height;
            p.depth = depth;
            p.crack = crack;

            platforms.push(p);
        };
        lavas = []
        const spawnLava = (group, x, y, z, width = 1, height = 1, depth = 1) => {
            const p = new THREE.Mesh(
                new THREE.BoxGeometry(width, height, depth),
                lavalMat
            );

            p.position.set(x, y, z);
            group.add(p);

            p.width = width;
            p.height = height;
            p.depth = depth;

            lavas.push(p);
        };
        bouncies = []
        const spawnBounce = (group, x, y, z, width = 5, height = 1, depth = 5) => {
            const p = new THREE.Mesh(
                new THREE.BoxGeometry(width, height, depth),
                bouncy
            );

            p.position.set(x, y, z);
            group.add(p);

            p.width = width;
            p.height = height;
            p.depth = depth;

            bouncies.push(p);
        };
        waters = []
        const spawnWater = (group, x, y, z, width = 1, height = 1, depth = 1) => {
            const borderSize = 0.1;

            let p = new THREE.Mesh(new THREE.BoxGeometry(width, height, depth), waterMat);
            p.position.set(x, y, z);
            group.add(p);

            let p1 = new THREE.Mesh(new THREE.BoxGeometry(borderSize, height, depth), waterMat);
            p1.position.set(x - width / 2 - borderSize / 2, y, z);
            group.add(p1);

            let p2 = new THREE.Mesh(new THREE.BoxGeometry(borderSize, height, depth), waterMat);
            p2.position.set(x + width / 2 + borderSize / 2, y, z);
            group.add(p2);

            let p3 = new THREE.Mesh(new THREE.BoxGeometry(width, height, borderSize), waterMat);
            p3.position.set(x, y, z + depth / 2 + borderSize / 2);
            group.add(p3);

            let p4 = new THREE.Mesh(new THREE.BoxGeometry(width, height, borderSize), waterMat);
            p4.position.set(x, y, z - depth / 2 - borderSize / 2);
            group.add(p4);

            p.width = width;
            p.height = height;
            p.depth = depth;

            waters.push(p);
        };

        let px = 0
        let py = 2
        let pz = -10
        let lastWaterWallZ = 1000
        let hasSpawnedWater = false
        function bindButton(id, key) {
            const btn = document.getElementById(id);

            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                keys[key] = true;
            }, { passive: false });

            btn.addEventListener('touchend', (e) => {
                e.preventDefault();
                keys[key] = false;
            });

            btn.addEventListener('mousedown', () => keys[key] = true);
            btn.addEventListener('mouseup', () => keys[key] = false);
        }
        bindButton("left", "ArrowLeft");
        bindButton("right", "ArrowRight");
        bindButton("up", "ArrowUp");
        bindButton("jump", "Space");
        checkpoints = []

        let players3d = {}

        socket.on("players", (data) => {

            players3d = data;

        });
        // Group 1
        const size = 5
        spawnPlatform(group1, -8, -11, 0, size, 1, size);
        spawnPlatform(group1, -12, -11, -12, size, 1, size);
        spawnPlatform(group1, -24, -11, -16, size, 1, size);
        spawnPlatform(group1, -36, -11, -12, size, 1, size);
        spawnPlatform(group1, -40, -11, 0, size, 1, size);
        spawnPlatform(group1, -36, -11, 12, size, 1, size);
        spawnPlatform(group1, -24, -11, 16, size, 1, size);
        spawnPlatform(group1, -12, -11, 12, size, 1, size);

        spawnPlatform(group1, -24, 4, 0, 8, 1, 8);
        spawnBounce(group1, -24, -11, 0, 12, 1, 12);

        // Group 2
        const size2 = 4
        spawnPlatform(group2, -10, 3, 0, size2, 1, size2);
        spawnPlatform(group2, -2, 6, 0, size2, 1, size2);
        spawnPlatform(group2, 6, 9, 0, size2, 1, size2);
        spawnPlatform(group2, 14, 12, 0, size2, 1, size2);
        spawnPlatform(group2, 22, 15, 0, size2, 1, size2);

        spawnPlatform(group2, 40, 11, 0, 30, 1, 30);
        spawnPlatform(group2, 40, 24, 0, 16, 1, 16);
        spawnBounce(group2, 40, 25, 0, 4, 1, 4)

        spawnWater(group2, 30, 17, 10, 4, 12, 4);
        spawnWater(group2, 50, 17, 10, 4, 12, 4);
        spawnWater(group2, 30, 17, -10, 4, 12, 4);
        spawnWater(group2, 50, 17, -10, 4, 12, 4);

        // Group 3

        // ===== Group 3 =====

        // Entrance bridge
        spawnPlatform(group3, 40, 15, -30, 4, 1, 18);
        spawnLava(group3, 40, 16, -30, 4, 1, 1);

        // Main arena
        spawnPlatform(group3, 40, 11, -60, 30, 1, 30);


        // Lava (only in the corners)
        spawnLava(group3, 32, 12, -52, 5, 1, 5);
        spawnLava(group3, 48, 12, -52, 5, 1, 5);
        spawnLava(group3, 32, 12, -68, 5, 1, 5);
        spawnLava(group3, 48, 12, -68, 5, 1, 5);

        // Bounce pads AWAY from lava
        spawnBounce(group3, 30, 12, -60, 4, 1, 4);
        spawnBounce(group3, 50, 12, -60, 4, 1, 4);
        const increase = 10
        // Side platforms
        spawnPlatform(group3, 24, 18 + increase, -60, 5, 1, 5);
        spawnPlatform(group3, 56, 18 + increase, -60, 5, 1, 5);

        // Easier upper parkour
        spawnPlatform(group3, 40, 21 + increase, -60, 18, 1, 4);
        spawnPlatform(group3, 36, 26 + increase, -56, 4, 1, 4);
        spawnPlatform(group3, 44, 29 + increase, -60, 4, 1, 4);
        spawnPlatform(group3, 40, 32 + increase, -64, 5, 1, 5);

        // Finish
        spawnPlatform(group3, 40, 36 + increase, -72, 8, 1, 8);

        // =======================
        // GROUP 4
        // =======================

        // ----- Bridge from Group 1 -----
        // ----- Bridge from Group 3 to Group 4 -----

        spawnPlatform(group4, 28, 44, -70, 5, 1, 5);
        spawnPlatform(group4, 16, 42, -68, 5, 1, 5);
        spawnPlatform(group4, 4, 40, -66, 5, 1, 5);
        spawnPlatform(group4, -8, 38, -64, 5, 1, 5);
        spawnPlatform(group4, -20, 36, -62, 5, 1, 5);

        spawnPlatform(group4, -24, -10, -10, 5, 1, 5);
        spawnPlatform(group4, -24, -8, -20, 5, 1, 5);
        spawnPlatform(group4, -24, -6, -30, 5, 1, 5);


        // ----- Water tower -----

        spawnWater(group4, -24, 15, -60, 30, 40, 30);

        // Roof
        spawnPlatform(group4, -24, 35.5, -60, 30, 1, 30);

        // ----- Spiral -----

        const centerX = -24;
        const centerZ = -60;

        const radius = 25;

        // Start just below the tower
        let height = -10;

        // About 3 full circles
        const turns = 3;
        const platformsPerTurn = 12;

        for (let i = 0; i < turns * platformsPerTurn; i++) {

            const angle = (Math.PI * 2 / platformsPerTurn) * i;

            const x = centerX + Math.cos(angle) * radius;
            const z = centerZ + Math.sin(angle) * radius;

            spawnPlatform(
                group4,
                x,
                height,
                z,
                5,
                1,
                5
            );

            // Climb slowly
            height += 1.3;
        }

        // ----- Finish -----

        spawnPlatform(group4, -10, 37, -60, 5, 1, 5);
        spawnPlatform(group4, -16, 38, -60, 5, 1, 5);
        spawnPlatform(group4, -20, 39, -60, 5, 1, 5);
        spawnPlatform(group4, -24, 40, -60, 8, 1, 8);

        const playerGeo = new THREE.BoxGeometry(1, 2, 1);


        const playerMat = [
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (50).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (50).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (51).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (51).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (50).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (49).png") }),
        ];
        const player = new THREE.Mesh(playerGeo, playerMat);
        const sensitivity = 0.002


        const keys = {}


        let pyVelocity = 0;
        let gravity = -0.015;
        let gravityBool = 1
        const jumpForce = 0.4;
        let speed = 0.15;
        let currentSpeed = speed
        let isGrounded = true;

        let cameraAngle = 0;
        let cameraLookY = 0
        const cameraRadius = 10;
        const rotationSpeed = 0.03;

        let isFirstPerson = false
        let isTouching = false

        window.addEventListener('touchstart', (e) => { isTouching = true });
        window.addEventListener('touchend', (e) => { isTouching = false });

        window.addEventListener('mousedown', (e) => { isTouching = true });
        window.addEventListener('mouseup', (e) => { isTouching = false });

        renderer.domElement.addEventListener("click", () => {
            renderer.domElement.requestPointerLock();
            isFirstPerson = true
        });
        document.addEventListener("pointerlockchange", () => {
            if (document.pointerLockElement === renderer.domElement) {
                isFirstPerson = true;
            } else {
                isFirstPerson = false;
                cameraLookY = 0;
            }
        });
        window.addEventListener("mousemove", (e) => {
            if (isTouching) {
                cameraAngle += e.movementX * sensitivity
            }
            if (document.pointerLockElement !== renderer.domElement) return;

            cameraAngle -= e.movementX * sensitivity;
            cameraLookY -= e.movementY * sensitivity;

            cameraLookY = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, cameraLookY));
        });
        let lastTouchX = null;

        window.addEventListener("touchstart", (e) => {
            lastTouchX = e.touches[0].clientX;
        });

        window.addEventListener("touchmove", (e) => {
            if (!isTouching) return;

            const touch = e.touches[0];
            const dx = touch.clientX - lastTouchX;

            cameraAngle -= dx * sensitivity;

            lastTouchX = touch.clientX;
        });

        window.addEventListener("touchend", () => {
            lastTouchX = null;
        });

        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);
        function playerHitsPlatform(p) {
            if (!p.visible || !p.parent.visible) return false;
            const withinX = player.position.x >= p.position.x - p.width / 2 - 0.5 && player.position.x <= p.position.x + p.width / 2 + 0.5;
            const withinZ = player.position.z >= p.position.z - p.depth / 2 - 0.5 && player.position.z <= p.position.z + p.depth / 2 + 0.5;

            const topOfPlatform = p.position.y + p.height / 2 + 1;
            const bottomOfPlatform = p.position.y - p.height / 2 - 1;
            const hittingTop = player.position.y < topOfPlatform && player.position.y > bottomOfPlatform;
            return withinX && withinZ && hittingTop
        }
        let isInWater = false;
        let wasInWater = false;
        let justEnteredWater = 0;
        let save = {
            x: -23,
            y: 6,
            z: 0
        }
        let isOwner = false;
        let fullMap = false;

        function makeMap(bool) {
            socket.emit("makeMap", bool)
        }

        socket.on("mapMod", (bool) => {
            fullMap = bool
        })

        socket.on("ownerStatus", (value) => {
            isOwner = value;
        });

        player.position.set(save.x, save.y, save.z);
        scene.add(player);
        let basegravity = gravity
        let lastSent = {
            x: 0,
            y: 0,
            z: 0
        };

        function animate() {

            requestAnimationFrame(animate);

            currentSpeed = speed
            const playerNames = document.getElementById("playersOnline");
            let playerCount = document.getElementById("playerCount");

            playerNames.innerHTML = "";

            for (const id in players3d) {
                const li = document.createElement("li");
                li.textContent = players3d[id].name;
                playerNames.appendChild(li);
            }

            playerCount.textContent = Object.keys(players3d).length;
            let playerCountNum = Object.keys(players3d).length;

            group1.visible = true;
            group2.visible = true;
            group3.visible = playerCountNum >= 3 || fullMap;
            group4.visible = playerCountNum >= 4 || fullMap;
            if (keys['ShiftRight'] || keys['ShiftLeft']) {
                currentSpeed = speed * 2
            }


            if (keys.ArrowLeft || keys.KeyA) cameraAngle += rotationSpeed;
            if (keys.ArrowRight || keys.KeyD) cameraAngle -= rotationSpeed;

            const forwardX = Math.sin(cameraAngle);
            const forwardZ = Math.cos(cameraAngle);

            if (keys.ArrowUp || keys.KeyW) {
                player.position.x -= forwardX * currentSpeed;
                player.position.z -= forwardZ * currentSpeed;
            }
            if (keys.ArrowDown || keys.KeyS) {
                player.position.x += forwardX * currentSpeed;
                player.position.z += forwardZ * currentSpeed;
            }

            const status = document.getElementById("itStatus");

            if (players3d[socket.id]?.it) {
                status.textContent = "YOU ARE IT!";
            } else {
                let name;
                for (const id in players3d) {
                    if (players3d[id].it) {
                        name = players3d[id].name
                    }
                }
                status.textContent = `${name} is it!`;
            }


            pyVelocity += gravity;
            player.position.y += pyVelocity;
            isGrounded = false;
            wasInWater = isInWater;
            isInWater = false;

            waters.forEach(w => {
                if (playerHitsPlatform(w)) {
                    isInWater = true;
                }
            });

            if (isInWater && !wasInWater) {
                justEnteredWater = 15;
            }
            if (!isInWater && wasInWater) {
                justEnteredWater = 15;
            }

            if (justEnteredWater > 0) justEnteredWater--;
            if (isInWater) {
                gravity = -basegravity
                player.position.y += 0.01
                gravityBool = -1
                scene.background = new THREE.Color(0x0000ff);
            } else {
                gravity = basegravity
                gravityBool = 1
                scene.background = new THREE.Color(0x74b0c8);
            }
            if (keys['KeyQ'] && isOwner) {
                gravity = 0
            }

            platforms.forEach(p => {
                const topOfPlatform = p.position.y + p.height / 2 + 1;
                const bottomOfPlatform = p.position.y - p.height / 2 - 1;
                if (playerHitsPlatform(p)) {
                    if (gravity < 0) {
                        if (justEnteredWater === 0) {
                            if (pyVelocity === 0) return
                            player.position.y = topOfPlatform;
                        }
                    } else {
                        if (justEnteredWater === 0) {
                            player.position.y = bottomOfPlatform;
                        }
                    }

                    pyVelocity = 0;
                    isGrounded = true;
                    if (p.crack) {
                        p.position.y -= 0.03 * gravityBool;
                        player.position.y -= 0.03 * gravityBool;
                    }
                }
            });
            bouncies.forEach(p => {
                const topOfPlatform = p.position.y + p.height / 2 + 1;
                const bottomOfPlatform = p.position.y - p.height / 2 - 1;
                if (playerHitsPlatform(p)) {
                    if (gravity < 0) {
                        player.position.y = topOfPlatform;
                    }
                    else {
                        player.position.y = bottomOfPlatform;
                    }
                    pyVelocity = jumpForce * 2 * gravityBool;
                }
            });
            lavas.forEach(p => {
                if (playerHitsPlatform(p)) {
                    player.position.x = save.x
                    player.position.y = save.y
                    player.position.z = save.z
                    socket.emit("fellOff");
                }
            });
            checkpoints.forEach(p => {
                if (playerHitsPlatform(p)) {
                    save.x = player.position.x
                    save.y = player.position.y
                    save.z = player.position.z
                    checkpoints.splice(checkpoints.indexOf(p), 1)
                    scene.remove(p)
                }
            });

            if (keys["Space"] && isGrounded) {
                pyVelocity = jumpForce * gravityBool;
                isGrounded = false;
            }



            if (player.position.y < -50 || player.position.y > 800) {

                socket.emit("fellOff");

                player.position.x = save.x;
                player.position.y = save.y;
                player.position.z = save.z;
                pyVelocity = 0;
            }

            if (!isFirstPerson) {
                const camX = player.position.x + Math.sin(cameraAngle) * cameraRadius;
                const camZ = player.position.z + Math.cos(cameraAngle) * cameraRadius;
                let camY = player.position.y + 6;
                if (gravityBool === -1) {
                    camY = player.position.y - 6;
                }
                camera.position.set(camX, camY, camZ);
                camera.lookAt(player.position)

            } else {
                const camX = player.position.x;
                const camY = player.position.y + 0.8;
                const camZ = player.position.z;

                camera.position.set(camX, camY, camZ);

                const dirX = -Math.sin(cameraAngle) * Math.cos(cameraLookY);
                const dirY = Math.sin(cameraLookY);
                const dirZ = -Math.cos(cameraAngle) * Math.cos(cameraLookY);

                camera.rotation.order = "YXZ";
                camera.rotation.y = cameraAngle;
                camera.rotation.x = cameraLookY;
            }


            if (
                player.position.x !== lastSent.x ||
                player.position.y !== lastSent.y ||
                player.position.z !== lastSent.z
            ) {
                socket.emit("move", {
                    x: player.position.x,
                    y: player.position.y,
                    z: player.position.z
                });

                lastSent.x = player.position.x;
                lastSent.y = player.position.y;
                lastSent.z = player.position.z;
            }

            for (const id in players3d) {

                if (id === socket.id) continue;

                const p = players3d[id];

                if (!otherPlayers[id]) {


                    let mesh;
                    if (p.it) {
                        mesh = new THREE.Mesh(playerGeo, itMat);

                    } else {
                        mesh = new THREE.Mesh(playerGeo, playerMat);

                    }


                    const tag = createNameTag(p.name);
                    mesh.userData.nameTag = tag; // save reference
                    mesh.userData.lastName = p.name;
                    mesh.add(tag);

                    scene.add(mesh);
                    otherPlayers[id] = mesh;

                }

                otherPlayers[id].position.set(
                    p.x,
                    p.y,
                    p.z
                );
                otherPlayers[id].material = p.it ? itMat : playerMat;

                if (otherPlayers[id].userData.lastName !== p.name) {
                    otherPlayers[id].remove(otherPlayers[id].userData.nameTag);

                    const newTag = createNameTag(p.name);

                    otherPlayers[id].add(newTag);

                    otherPlayers[id].userData.nameTag = newTag;
                    otherPlayers[id].userData.lastName = p.name;
                }


            }

            for (const id in otherPlayers) {

                if (!players3d[id]) {
                    scene.remove(otherPlayers[id]);
                    delete otherPlayers[id];
                }

            }
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>

</html>
