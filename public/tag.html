<!DOCTYPE html>
<html>

<head>

    <title>Multiplayer Tag</title>

    <link rel="stylesheet" href="styles1.css" />

</head>

<body>
    <button onclick="home()" id="home">Home</button>
    <h1 id="admin"></h1>
    <h2 id="score"></h2>

    <canvas id="game" width="800" height="500"></canvas>

    <script src="/socket.io/socket.io.js"></script>

    <div id="mobileControls">
        <button id="left">←</button>
        <button id="right">→</button>
        <button id="up">ꜛ</button>
        <button id="down">↓</button>

    </div>

    <script>
        const keys = {};
        function bindButton(id, key) {
            const btn = document.getElementById(id);

            function press(e) {
                e.preventDefault();
                keys[key] = true;
            }

            function release(e) {
                e.preventDefault();
                keys[key] = false;
            }

            btn.addEventListener("touchstart", press, { passive: false });
            btn.addEventListener("touchend", release, { passive: false });
            btn.addEventListener("touchcancel", release, { passive: false });

            btn.addEventListener("mousedown", press);
            btn.addEventListener("mouseup", release);
            btn.addEventListener("mouseleave", release);
        }


        bindButton("left", "a");
        bindButton("right", "d");
        bindButton("up", "w");
        bindButton("down", "s");
        function home() {
            window.location.href = "index.html";
        }
        setInterval(() => {
            let scorePanel = document.getElementById('score');
            scorePanel.innerText = '';

            for (let id in flatPlayers) {
                let player = flatPlayers[id];
                scorePanel.innerText += `${player.name}: ${player.timeIT}\n`;
            }
        }, 50);

        const socket = io();
        socket.emit("joinTag", "down");

        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");



        let flatPlayers = {};

        let myX = 400;
        let myY = 250;

        function ban(name) {
            socket.emit("ban", name)
        }


        socket.on("connect", () => {

            console.log("Connected!");
            let playerName = prompt("Enter your name:");

            if (!playerName || playerName.trim() === "") {
                playerName = "Player";
            }

            socket.emit("setName", playerName);

        });
        socket.on("playerMove", (data) => {
            if (!flatPlayers[data.id]) return;

            flatPlayers[data.id].x = data.x;
            flatPlayers[data.id].y = data.y;
            flatPlayers[data.id].it = data.it;
            flatPlayers[data.id].facing = data.facing;
        });
        socket.on("kicked", () => {
            alert("You have been kicked from the game. Please rejoin");
            window.location.href = "index.html";
        });
        let lastSent = {
            x: myX,
            y: myY
        };


        socket.on("players", (data) => {

            flatPlayers = data;

        });

        document.addEventListener("keydown", (e) => {

            keys[e.key.toLowerCase()] = true;

        });

        document.addEventListener("keyup", (e) => {

            keys[e.key.toLowerCase()] = false;

        });
        let speed = 4;

        function update() {



            if (keys["w"]) myY -= speed;
            if (keys["s"]) myY += speed;
            if (keys["a"]) myX -= speed;
            if (keys["d"]) myX += speed;

            myX = Math.max(0, Math.min(canvas.width - 30, myX));
            myY = Math.max(0, Math.min(canvas.height - 30, myY));

            if (myX !== lastSent.x || myY !== lastSent.y) {
                socket.emit("move", {
                    x: myX,
                    y: myY
                });

                lastSent.x = myX;
                lastSent.y = myY;
            }

        }
        const imageCache = {};

        function loadImage(src) {
            if (!imageCache[src]) {
                imageCache[src] = new Image();
                imageCache[src].src = src;
            }

            return imageCache[src];
        }

        function draw() {

            ctx.fillStyle = "#87CEEB";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let id in flatPlayers) {


                const p = flatPlayers[id];
                if (p.facing === "side") continue;

                const img = loadImage(p.color);

                if (img.complete) {
                    ctx.drawImage(img, p.x, p.y, 30, 30);
                }

                if (p.it) {

                    ctx.strokeStyle = "red";
                    ctx.lineWidth = 4;
                    ctx.strokeRect(p.x - 2, p.y - 2, 34, 34);

                }

                ctx.fillStyle = "black";
                ctx.font = "12px Arial";
                ctx.fillText(p.name, p.x, p.y - 5);

            }

        }

        function gameLoop() {

            update();
            draw();

            requestAnimationFrame(gameLoop);

        }

        gameLoop();

    </script>

</body>

</html>
