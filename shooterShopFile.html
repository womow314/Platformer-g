<!DOCTYPE html>
<html>
<head>
    <title>Shooter shop | Games.io</title>
    <link rel="stylesheet" href="styles1.css" />
</head>
<body>

<button onclick="home()" id="home">Home</button>

<div id="shooterShopDiv">

    <h3 id="coins"></h3>

    <h3 id="shopHealth"></h3>
    <button id="healthBtn" onclick="buy(1)">
    </button>

    <h3 id="shopPower"></h3>
    <button id="powerBtn" onclick="buy(2)">
    </button>

    <h3 id="killMOD"></h3>
    <button id="killMODBTN" onclick="buy(3)"> +3 kill at start 1 KC
    </button>
</div>

<div id="skillTree">
    <h3 id="skillCoins"></h3>
    <button>Start</button>
    <button onclick="buySkill(1)" id="rapid">x2 fire</button>
    <button style="display: none;"> x2 Force Field damage</button>
</div>

<script>
    localStorage.setItem('localPower', localStorage.getItem('localPower') || "1");

    localStorage.setItem('localHealth', localStorage.getItem('localHealth') || "100");

    localStorage.setItem('localPowerCost', localStorage.getItem('localPowerCost') || "10");

    localStorage.setItem('localHealthCost', localStorage.getItem('localHealthCost') || "10");

    localStorage.setItem('killCoins', localStorage.getItem('killCoins') || "0");

    localStorage.setItem('repeatFire', localStorage.getItem('repeatFire') || "1");

    localStorage.setItem('killModifyer', localStorage.getItem('killModifyer') || "0");

    localStorage.setItem('mostKillsWithMod', localStorage.getItem('mostKillsWithMod') || "0")

    localStorage.setItem('skillCoinsSpent', localStorage.getItem('skillCoinsSpent') || "0")

    skillCoins = Math.floor(Number(localStorage.getItem('mostKillsWithMod'))/10) - Number(localStorage.getItem('skillCoinsSpent'))

    updateUI();

    function updateUI() {

        document.querySelector('#coins').innerText =
            `You have: ${localStorage.getItem('killCoins')} KC`;

        document.querySelector('#shopHealth').innerText =
            `Base health: ${localStorage.getItem('localHealth')}`;

        document.querySelector('#shopPower').innerText =
            `Base power: ${localStorage.getItem('localPower')}`;

        document.querySelector('#healthBtn').innerText =
            `Upgrade health ${localStorage.getItem('localHealth')} => ${Number(localStorage.getItem('localHealth')) + 10}. ${localStorage.getItem('localHealthCost')} KC`;

        document.querySelector('#powerBtn').innerText =
            `Upgrade power ${localStorage.getItem('localPower')} => ${Number(localStorage.getItem('localPower')) + 1}. ${localStorage.getItem('localPowerCost')} KC`;

        document.querySelector('#killMOD').innerText = `+${localStorage.getItem('killModifyer')} kills at start`
        skillCoins = Math.floor(Number(localStorage.getItem('mostKillsWithMod'))/10) - Number(localStorage.getItem('skillCoinsSpent'))
        document.querySelector('#skillCoins').innerText = `${skillCoins} skill coins`
        document.querySelector('#rapid').innerText = `x${Number(localStorage.getItem('repeatFire')) + 1} fire`
    }

    function home() {
        window.location.href = "index.html";
    }

    function buy(x) {

        if (x === 1) {

            if (
                Number(localStorage.getItem('killCoins')) >=
                Number(localStorage.getItem('localHealthCost'))
            ) {

                localStorage.setItem(
                    'localHealth',
                    String(Number(localStorage.getItem('localHealth')) + 10)
                );

                localStorage.setItem(
                    'killCoins',
                    String(
                        Number(localStorage.getItem('killCoins')) -
                        Number(localStorage.getItem('localHealthCost'))
                    )
                );

                localStorage.setItem(
                    'localHealthCost',
                    String(
                        Number(localStorage.getItem('localHealthCost')) + 1
                    )
                );
            }
        }

        if (x === 2) {

            if (
                Number(localStorage.getItem('killCoins')) >=
                Number(localStorage.getItem('localPowerCost'))
            ) {

                localStorage.setItem(
                    'localPower',
                    String(Number(localStorage.getItem('localPower')) + 1)
                );

                localStorage.setItem(
                    'killCoins',
                    String(
                        Number(localStorage.getItem('killCoins')) -
                        Number(localStorage.getItem('localPowerCost'))
                    )
                );
                localStorage.setItem(
                    'localPowerCost',
                    String(
                        Number(localStorage.getItem('localPowerCost')) + 1
                    )
                );

                

                
            }
        }
        if (x === 3) {
            if (Number(localStorage.getItem('killCoins')) >= 1) {
                localStorage.setItem('killModifyer', String(Number(localStorage.getItem('killModifyer')) + 3))

                localStorage.setItem(
                    'killCoins',
                    String(
                        Number(localStorage.getItem('killCoins')) - 1
                    )
                );
            }
        }
        updateUI();
    }

    function buySkill (x) {
        if (x === 1 && skillCoins > 20) {
            localStorage.setItem('repeatFire', String(Number(localStorage.getItem('repeatFire'))+1));
            localStorage.setItem('skillCoinsSpent', String(Number(localStorage.getItem('skillCoinsSpent'))+20));
            updateUI()
        }
    }
</script>

</body>
</html>
