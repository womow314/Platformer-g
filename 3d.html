<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Games.io</title>
    <link rel="stylesheet" href="styles1.css" />
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB;
        }

        canvas {
            display: block;
        }

        #instructions {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-family: sans-serif;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 5px;
        }
    </style>
    <button onclick="home()" id="home">Home</button>
    <div id="mobileControls">
        <button id="left">←</button>
        <button id="right">→</button>
        <button id="up">ꜛ</button>
        <button id="jump">⤒</button>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>

<body>

    <div id="instructions">
        <strong>Controls:</strong><br>
        Move: Up arrow/Down<br>
        Turn: Left/right arrow
        Jump: Spacebar
    </div>

    <script>
        function home() {
            window.location.href = "index.html";
        }
        const loader = new THREE.TextureLoader();
        const scene = new THREE.Scene();
        //scene.background = new THREE.Color(0x87CEEB);
        scene.background = new THREE.Color(0x74b0c8);
        //scene.background = loader.load("images/pixil-frame-0 (3).png")

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 15);
        scene.add(dirLight);

        const waterMat = new THREE.MeshStandardMaterial({
            map: loader.load("images/pixil-frame-0 (6).png"),
            transparent: true,
            opacity: 0.5
        });

        const platMat = [
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (53).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (53).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (52).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (52).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (53).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (53).png") }),
        ];
        const platMatCrack = [
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (4).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (4).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (56).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (56).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (4).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (4).png") }),
        ];
        const bouncy = [
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (54).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (54).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (54).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (54).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (54).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (54).png") }),
        ];
        const lavalMat = [
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (5).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (5).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (5).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (5).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (5).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (5).png") }),
        ];
        const platforms = [];
        const spawnPlatform = (x, y, z, width = 5, height = 1, depth = 5, crack = false, check = false) => {
            let p
            if (!crack) {
                p = new THREE.Mesh(new THREE.BoxGeometry(width, height, depth), platMat);
            } else {
                p = new THREE.Mesh(new THREE.BoxGeometry(width, height, depth), platMatCrack);
            }
            p.position.set(x, y, z);
            scene.add(p);
            p.width = width;
            p.height = height;
            p.depth = depth;
            p.crack = crack
            platforms.push(p);

        };
        lavas = []
        const spawnLava = (x, y, z, width = 1, height = 1, depth = 1) => {
            const p = new THREE.Mesh(new THREE.BoxGeometry(width, height, depth), lavalMat);
            p.position.set(x, y, z);
            scene.add(p);
            p.width = width;
            p.height = height;
            p.depth = depth;
            lavas.push(p);

        };
        bouncies = []
        const spawnBounce = (x, y, z, width = 5, height = 1, depth = 5) => {
            const p = new THREE.Mesh(new THREE.BoxGeometry(width, height, depth), bouncy);
            p.position.set(x, y, z);
            scene.add(p);
            p.width = width;
            p.height = height;
            p.depth = depth;
            bouncies.push(p);

        };
        waters = []
        const spawnWater = (x, y, z, width = 1, height = 1, depth = 1) => {
            const p = new THREE.Mesh(new THREE.BoxGeometry(width, height, depth), waterMat);
            p.position.set(x, y, z);
            scene.add(p);
            p.width = width;
            p.height = height;
            p.depth = depth;
            waters.push(p);

        };

        let px = 0
        let py = 2
        let pz = -10
        function bindButton(id, key) {
            const btn = document.getElementById(id);

            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                keys[key] = true;
            }, { passive: false });

            btn.addEventListener('touchend', (e) => {
                e.preventDefault();
                keys[key] = false;
            });

            btn.addEventListener('mousedown', () => keys[key] = true);
            btn.addEventListener('mouseup', () => keys[key] = false);
        }
        bindButton("left", "ArrowLeft");
        bindButton("right", "ArrowRight");
        bindButton("up", "ArrowUp");
        bindButton("jump", "Space");
        function makeNewPlatform() {
            let roll = Math.random()
            //roll = 0.79
            let isCracked = Math.random() < 0.2
            if (roll < 0.1) {
                spawnPlatform(px, py, pz, 5, 1, 10, isCracked);
                for (let i = 0; i <= 4; i++) {
                    spawnLava(px + 2 - i, py + 1, pz)
                    spawnLava(px + 2 - i, py - 1, pz)
                    spawnLava(px + 2 - i, py, pz)

                    if (roll < 0.05) {
                        spawnLava(px + 2 - i, py + 2, pz)
                        spawnLava(px + 2 - i, py - 2, pz)
                    }
                    if (roll < 0.025) {
                        spawnLava(px + 2 - i, py + 3, pz)
                        spawnLava(px + 2 - i, py - 3, pz)
                    }
                }
                if (Math.random() < 0.5) {
                    const height = 9
                    for (let i = 2; i < height; i++) {
                        spawnLava(px + 2, py + i, pz)
                        spawnLava(px - 2, py + i, pz)
                    }
                    spawnLava(px, py + height, pz, 5)
                }
                pz -= 2.5
            } else if (roll < 0.2) {
                spawnPlatform(px, py, pz);
                spawnPlatform(px, py, pz - 5);
                spawnPlatform(px + 5, py, pz - 5);
                spawnPlatform(px + 5, py, pz - 10);
                pz -= 10
            } else if (roll < 0.3) {
                spawnPlatform(px, py, pz, 5, 1, 5, isCracked);
                spawnPlatform(px + 10, py, pz, 5, 1, 5, isCracked);
                spawnPlatform(px + 20, py, pz, 5, 1, 5, isCracked);

                spawnPlatform(px + 30, py, pz - 2.5, 5, 1, 10, isCracked);
                px += 35
                pz -= 5
            } else if (roll < 0.5) {
                spawnPlatform(px, py, pz, 5, 1, 5, isCracked);
                spawnLava(px, py + 1, pz)
                spawnLava(px, py, pz)
                spawnLava(px, py - 1, pz)
            } else if (roll < 0.6) {
                spawnPlatform(px, py, pz, 11, 1, 11, isCracked);
                spawnLava(px, py + 3.5, pz, 8, 1, 8)
                if (roll < 0.55) {
                    spawnLava(px, py + 1, pz, 4, 1, 4)
                    spawnLava(px, py, pz, 4, 1, 4)
                    spawnLava(px, py - 1, pz, 4, 1, 4)
                    spawnLava(px, py + 2, pz, 4, 1, 4)
                    spawnLava(px, py + 3, pz, 4, 1, 4)
                }
            } else if (roll < 0.7) {
                spawnBounce(px, py, pz);
                py += 15
            } else if (roll < 0.8) {
                spawnPlatform(px, py, pz, 3, 1, 11, isCracked);
                spawnBounce(px, py, pz - 7, 3, 1, 3);
                spawnLava(px - 2.5, py, pz - 16, 0.5, 1, 6);
                spawnLava(px + 2.5, py, pz - 16, 0.5, 1, 6);
                spawnLava(px, py, pz - 19, 5, 1, 0.5);
                spawnLava(px, py, pz - 13, 5, 1, 0.5);
                spawnPlatform(px, py - 6, pz - 17, 3, 1, 6, isCracked);
                pz -= 18
                py -= 6

            } else {
                spawnPlatform(px, py, pz, Math.random() * 4 + 3, 1, Math.random() * 4 + 3, isCracked, true);

            }
            px += Math.random() * 8 - 4
            py += Math.random() * 4 - 1
            pz -= Math.random() * 4 + 7
            if (isCracked) py -= 1
        }
        for (let i = 0; i < 50; i++) {
            makeNewPlatform()
        }
        spawnPlatform(0, -1, 0, 8, 1, 8)
        spawnWater(0, 4, 0)


        const playerGeo = new THREE.BoxGeometry(1, 2, 1);


        const playerMat = [
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (50).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (50).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (51).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (51).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (50).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (49).png") }),
        ];
        const player = new THREE.Mesh(playerGeo, playerMat);
        const sensitivity = 0.002
        player.position.set(0, 1, 0);
        scene.add(player);

        const keys = {}


        let pyVelocity = 0;
        const gravity = -0.015;
        const gravityBool = 1
        const jumpForce = 0.4;
        const speed = 0.15;
        let isGrounded = true;

        let cameraAngle = 0;
        let cameraLookY = 0
        const cameraRadius = 10;
        const rotationSpeed = 0.03;

        let isFirstPerson = false

        renderer.domElement.addEventListener("click", () => {
            renderer.domElement.requestPointerLock();
            isFirstPerson = true
        });
        document.addEventListener("pointerlockchange", () => {
            if (document.pointerLockElement === renderer.domElement) {
                isFirstPerson = true;
            } else {
                isFirstPerson = false;
                cameraLookY = 0;
            }
        });
        window.addEventListener("mousemove", (e) => {
            if (document.pointerLockElement !== renderer.domElement) return;

            cameraAngle -= e.movementX * sensitivity;
            cameraLookY -= e.movementY * sensitivity;

            cameraLookY = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, cameraLookY));
        });

        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);
        function playerHitsPlatform(p) {
            const withinX = player.position.x >= p.position.x - p.width / 2 - 0.5 && player.position.x <= p.position.x + p.width / 2 + 0.5;
            const withinZ = player.position.z >= p.position.z - p.depth / 2 - 0.5 && player.position.z <= p.position.z + p.depth / 2 + 0.5;

            const topOfPlatform = p.position.y + p.height / 2 + 1;
            const bottomOfPlatform = p.position.y - p.height / 2 - 1;
            const hittingTop = player.position.y <= topOfPlatform && player.position.y >= bottomOfPlatform;
            return withinX && withinZ && hittingTop
        }

        function animate() {
            requestAnimationFrame(animate);


            if (keys.ArrowLeft || keys.KeyA) cameraAngle += rotationSpeed;
            if (keys.ArrowRight || keys.KeyD) cameraAngle -= rotationSpeed;

            const forwardX = Math.sin(cameraAngle);
            const forwardZ = Math.cos(cameraAngle);

            if (keys.ArrowUp || keys.KeyW) {
                player.position.x -= forwardX * speed;
                player.position.z -= forwardZ * speed;
            }
            if (keys.ArrowDown || keys.KeyS) {
                player.position.x += forwardX * speed;
                player.position.z += forwardZ * speed;
            }

            pyVelocity += gravity;
            player.position.y += pyVelocity;
            isGrounded = false;



            platforms.forEach(p => {
                const topOfPlatform = p.position.y + p.height / 2 + 1;
                const bottomOfPlatform = p.position.y - p.height / 2 - 1;
                if (playerHitsPlatform(p)) {
                    if (gravity < 0) {
                        player.position.y = topOfPlatform;
                    }
                    else {
                        player.position.y = bottomOfPlatform;
                    }
                    pyVelocity = 0;
                    isGrounded = true;
                    if (p.crack) {
                        p.position.y -= 0.03
                        player.position.y -= 0.03
                    }
                }
            });
            bouncies.forEach(p => {
                const topOfPlatform = p.position.y + p.height / 2 + 1;
                const bottomOfPlatform = p.position.y - p.height / 2 - 1;
                if (playerHitsPlatform(p)) {
                    if (gravity < 0) {
                        player.position.y = topOfPlatform;
                    }
                    else {
                        player.position.y = bottomOfPlatform;
                    }
                    pyVelocity = jumpForce * 2 * gravityBool;
                }
            });
            lavas.forEach(p => {
                if (playerHitsPlatform(p)) {
                    player.position.set(0, 1, 0);
                }
            });

            if (keys["Space"] && isGrounded) {
                pyVelocity = jumpForce * gravityBool;
                isGrounded = false;
            }

            if (player.position.y < -50 || player.position.y > 800) {
                player.position.set(0, 1, 0);
                pyVelocity = 0;
            }

            if (!isFirstPerson) {
                const camX = player.position.x + Math.sin(cameraAngle) * cameraRadius;
                const camZ = player.position.z + Math.cos(cameraAngle) * cameraRadius;
                const camY = player.position.y + 6;
                camera.position.set(camX, camY, camZ);
                camera.lookAt(player.position)

            } else {
                const camX = player.position.x;
                const camZ = player.position.z;
                const camY = player.position.y + 0.8;
                camera.position.set(camX, camY, camZ);

                const lookX = player.position.x - Math.sin(cameraAngle);
                const lookY = player.position.y + 1 + Math.sin(cameraLookY);
                const lookZ = player.position.z - Math.cos(cameraAngle);

                camera.lookAt(lookX, lookY, lookZ);
            }



            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>

</html>
