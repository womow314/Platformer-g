<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple 3D Platformer</title>
    <link rel="stylesheet" href="styles1.css" />
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB;
        }

        canvas {
            display: block;
        }

        #instructions {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-family: sans-serif;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 5px;
        }
    </style>
    <button onclick="home()" id="home">Home</button>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>

<body>

    <div id="instructions">
        <strong>Controls:</strong><br>
        Move: Up arrow/Down<br>
        Turn: Left/right arrow
        Jump: Spacebar
    </div>

    <script>
        function home() {
            window.location.href = "index.html";
        }
        const loader = new THREE.TextureLoader();
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 15);
        scene.add(dirLight);

        const floorGeo = new THREE.BoxGeometry(50, 2, 50);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x228B22 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.position.y = -1;
        scene.add(floor);

        const platMat = [
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (53).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (53).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (52).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (52).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (53).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (53).png") }),
        ];
        const lavalMat = [
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (5).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (5).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (5).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (5).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (5).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (5).png") }),
        ];
        const platforms = [];
        const spawnPlatform = (x, y, z, width = 5, height = 1, depth = 5) => {
            const p = new THREE.Mesh(new THREE.BoxGeometry(width, height, depth), platMat);
            p.position.set(x, y, z);
            scene.add(p);
            p.width = width;
            p.height = height;
            p.depth = depth;
            platforms.push(p);

        };
        lavas = []
        const spawnLava = (x, y, z, width = 1, height = 1, depth = 1) => {
            const p = new THREE.Mesh(new THREE.BoxGeometry(width, height, depth), lavalMat);
            p.position.set(x, y, z);
            scene.add(p);
            p.width = width;
            p.height = height;
            p.depth = depth;
            lavas.push(p);

        };

        let px = 0
        let py = 2
        let pz = -10
        function makeNewPlatform() {
            let roll = Math.random()
            if (roll < 0.1) {
                spawnPlatform(px, py, pz, 5, 1, 10);
                spawnLava(px, py+1, pz)
                pz -= 5
            } else if (roll < 0.2) {
                spawnPlatform(px, py, pz);
                spawnPlatform(px, py, pz - 5);
                spawnPlatform(px + 5, py, pz - 5);
                spawnPlatform(px + 5, py, pz - 10);
                pz -= 10
            } else if (roll < 0.3) {
                spawnPlatform(px, py, pz);
                spawnPlatform(px + 10, py, pz);
                spawnPlatform(px + 20, py, pz);
                spawnPlatform(px + 30, py, pz);
                spawnPlatform(px + 30, py, pz - 5);
                px += 35
                pz -= 5
            } else {
                spawnPlatform(px, py, pz, Math.random() * 4 + 3, 1, Math.random() * 4 + 3);

            }
            px += Math.random() * 8 - 4
            py += Math.random() * 4 - 1
            pz -= Math.random() * 3.5 + 7.5
        }
        for (let i = 0; i < 50; i++) {
            makeNewPlatform()
        }


        const playerGeo = new THREE.BoxGeometry(1, 2, 1);

        const playerMat = [
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (50).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (50).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (51).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (51).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (50).png") }),
            new THREE.MeshStandardMaterial({ map: loader.load("images/pixil-frame-0 (49).png") }),
        ];
        const player = new THREE.Mesh(playerGeo, playerMat);
        const sensitivity = 0.003
        player.position.set(0, 1, 0);
        scene.add(player);

        const keys = {}


        let pyVelocity = 0;
        const gravity = -0.015;
        const jumpForce = 0.4;
        const speed = 0.15;
        let isGrounded = true;

        let cameraAngle = 0;
        let cameraLookY = 0
        const cameraRadius = 10;
        const rotationSpeed = 0.03;

        let isFirstPerson = false

        renderer.domElement.addEventListener("click", () => {
            renderer.domElement.requestPointerLock();
            isFirstPerson = true
        });
        document.addEventListener("pointerlockchange", () => {
            if (document.pointerLockElement === renderer.domElement) {
                isFirstPerson = true;
            } else {
                isFirstPerson = false;
                cameraLookY = 0;
            }
        });
        window.addEventListener("mousemove", (e) => {
            if (document.pointerLockElement !== renderer.domElement) return;

            cameraAngle -= e.movementX * sensitivity;
            cameraLookY -= e.movementY * sensitivity;

            cameraLookY = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, cameraLookY));
        });

        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function animate() {
            requestAnimationFrame(animate);


            if (keys.ArrowLeft || keys.KeyA) cameraAngle += rotationSpeed;
            if (keys.ArrowRight || keys.KeyD) cameraAngle -= rotationSpeed;

            const forwardX = Math.sin(cameraAngle);
            const forwardZ = Math.cos(cameraAngle);

            if (keys.ArrowUp || keys.KeyW) {
                player.position.x -= forwardX * speed;
                player.position.z -= forwardZ * speed;
            }
            if (keys.ArrowDown || keys.KeyS) {
                player.position.x += forwardX * speed;
                player.position.z += forwardZ * speed;
            }

            pyVelocity += gravity;
            player.position.y += pyVelocity;
            isGrounded = false;

            if (player.position.y <= 1 && player.position.x >= -25 && player.position.x <= 25 && player.position.z >= -25 && player.position.z <= 25) {
                player.position.y = 1;
                pyVelocity = 0;
                isGrounded = true;
            }

            platforms.forEach(p => {
                const withinX = player.position.x >= p.position.x - p.width / 2 - 0.5 && player.position.x <= p.position.x + p.width / 2 + 0.5;
                const withinZ = player.position.z >= p.position.z - p.depth / 2 - 0.5 && player.position.z <= p.position.z + p.depth / 2 + 0.5;

                const topOfPlatform = p.position.y + p.height / 2 + 1;
                const hittingTop = player.position.y <= topOfPlatform && player.position.y >= topOfPlatform + pyVelocity - 0.1;

                if (withinX && withinZ && hittingTop && pyVelocity <= 0) {
                    player.position.y = topOfPlatform;
                    pyVelocity = 0;
                    isGrounded = true;
                }
            });
            lavas.forEach(p => {
                const withinX = player.position.x >= p.position.x - p.width / 2 - 0.5 && player.position.x <= p.position.x + p.width / 2 + 0.5;
                const withinZ = player.position.z >= p.position.z - p.depth / 2 - 0.5 && player.position.z <= p.position.z + p.depth / 2 + 0.5;

                const topOfPlatform = p.position.y + p.height / 2 + 1;
                const hittingTop = player.position.y <= topOfPlatform && player.position.y >= topOfPlatform + pyVelocity - 0.1;

                if (withinX && withinZ && hittingTop && pyVelocity <= 0) {
                     player.position.x = 0
                    player.position.y = 1
                    player.position.z = 0

                }
            });

            if (keys["Space"] && isGrounded) {
                pyVelocity = jumpForce;
                isGrounded = false;
            }

            if (player.position.y < -20) {
                player.position.set(0, 1, 0);
                pyVelocity = 0;
            }

            if (!isFirstPerson) {
                const camX = player.position.x + Math.sin(cameraAngle) * cameraRadius;
                const camZ = player.position.z + Math.cos(cameraAngle) * cameraRadius;
                const camY = player.position.y + 6;
                camera.position.set(camX, camY, camZ);
                camera.lookAt(player.position)

            } else {
                const camX = player.position.x;
                const camZ = player.position.z;
                const camY = player.position.y + 1;
                camera.position.set(camX, camY, camZ);

                const lookX = player.position.x - Math.sin(cameraAngle);
                const lookY = player.position.y + 1 + Math.sin(cameraLookY);
                const lookZ = player.position.z - Math.cos(cameraAngle);

                camera.lookAt(lookX, lookY, lookZ);
            }



            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>

</html>
