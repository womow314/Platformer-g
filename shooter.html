function inRange(obj1, obj2, range) {
  if (!obj1 || !obj2) return false;

  const x1 = obj1.x + 15;
  const y1 = obj1.y + 15;

  const x2 = obj2.x + obj2.size / 2;
  const y2 = obj2.y + obj2.size / 2;

  const dx = x1 - x2;
  const dy = y1 - y2;

  const enemyRadius = obj2.size / 2;
  const fieldRadius = range / 2;

  return dx * dx + dy * dy < (fieldRadius + enemyRadius) * (fieldRadius + enemyRadius);
}

function bulletHitsEnemy(bullet, enemy) {
  const bulletRadius = bullet.size / 2;
  const enemyRadius = enemy.size / 2;

  const bulletCenterX = bullet.x + bulletRadius;
  const bulletCenterY = bullet.y + bulletRadius;

  const enemyCenterX = enemy.x + enemyRadius;
  const enemyCenterY = enemy.y + enemyRadius;

  const dx = bulletCenterX - enemyCenterX;
  const dy = bulletCenterY - enemyCenterY;

  const distanceSquared = dx * dx + dy * dy;
  const radiusSum = bulletRadius + enemyRadius;

  return distanceSquared <= radiusSum * radiusSum;
}

function getClosestMob() {
  let closest = null;
  let closestDist = Infinity;

  for (let enemy of enemies) {
    let dist = (enemy.x - player.x) * (enemy.x - player.x) + (enemy.y - player.y) * (enemy.y - player.y);

    if (dist < closestDist) {
      closestDist = dist;
      closest = enemy;
    }
  }

  return closest;
}

  document.querySelector("#cord").innerText = `Enemies on board: ${MobsOnBoard}, Kills: ${kills} + ${localStorage.getItem('killModifyer')} Modifier, Coins: ${coins}/${coinsToUpgrade}, Most Kills: ${mostKills}`
  let progressPercent = (coins / coinsToUpgrade) * 100;
  document.getElementById("progressBar").style.width = `${progressPercent}%`;
  if (isPaused) return;
  player.dx = 0; player.dy = 0;
  player.currentSpeed = player.speed
  if(keys['ShiftRight']||keys['ShiftLeft']) player.currentSpeed = player.speed *1.5;
  if (keys['KeyW']||keys['ArrowUp']) {player.dy = -player.currentSpeed; player.direction = "n"}
  if (keys['KeyS']||keys['ArrowDown']) {player.dy = player.currentSpeed; player.direction = "s"}
  if (keys['KeyA']||keys['ArrowLeft']) {player.dx = -player.currentSpeed; player.direction = "e"}
  if (keys['KeyD']||keys['ArrowRight']) {player.dx = player.currentSpeed; player.direction = "w"}
  
  MobsOnBoard = enemies.length
  bulletCooldown -= 1
  mobSpawnCooldown -= 1
  energyDrinkCooldown -= 1
  if (energyDrinkCooldown <=0 && health <= MaxHealth - energyDrinkEffect) {
    health += energyDrinkEffect
    energyDrinkCooldown = 700
  }
  
  if (MobsOnBoard  <= 0) mobSpawnCooldown = 0
  if (mobSpawnCooldown <=0) {
     killsWithMod = kills + Number(localStorage.getItem('killModifyer'))
    if (killsWithMod <= 20){
      mobSpawnCooldown = 180 - 6*killsWithMod
      spawnEnemy("basic")
    } else if (killsWithMod > 20 && killsWithMod <= 60) {
      mobSpawnCooldown = Math.max(180 - 2*(killsWithMod-20), 60)
      spawnEnemy("level2")
      let randomNum = Math.random()
      randomNum -= (killsWithMod-20)/13
      if(randomNum < 0.2) spawnEnemy("basic");
      if(randomNum <0.05) spawnEnemy("basic");
    } else if (killsWithMod > 60 && killsWithMod < 100) {
      mobSpawnCooldown = Math.max(200 - 2*(killsWithMod-60), 60)
      spawnEnemy("level3") 
      let randomNum = Math.random()
      randomNum -= (killsWithMod-60)/13
      if(randomNum < 0.2) spawnEnemy("basic");
      if(randomNum <0.05) spawnEnemy("level2");
    } else if (killsWithMod > 100 && killsWithMod <= 160) {
      if(!elite1Spawned) {
        spawnEnemy('elite1')
        elite1Spawned = true
      }
      mobSpawnCooldown = Math.max(150 - 2*(killsWithMod-100), 80)
      spawnEnemy("basic")
      spawnEnemy("basic")
      spawnEnemy("basic")
      let randomNum = Math.random()
      randomNum -= (killsWithMod-100)/20
      if(randomNum < 0.4) spawnEnemy("level2");
      if(randomNum <0.1) spawnEnemy("level3");
      if (killsWithMod >= 120) spawnEnemy("level4")
    } else if (killsWithMod > 160 && killsWithMod <= 250) {
      mobSpawnCooldown = 12
      spawnEnemy("level5")
      let randomNum = Math.random()
      if(randomNum < 0.1) spawnEnemy("level4");
    } else if (killsWithMod === 251 && !bossSpawned) {
      enemies = []
      bossSpawned = true
      spawnEnemy('boss1')
      mobSpawnCooldown = Infinity;
      
    } else if (killsWithMod >= 252 && killsWithMod < 300) {
      mobSpawnCooldown = 40
      spawnEnemy("level4")
    } else if(killsWithMod >= 300 && killsWithMod < 380) {
      mobSpawnCooldown = 160
      spawnEnemy('basic')
      spawnEnemy('level2')
      spawnEnemy('level3')
      spawnEnemy('level4')
      spawnEnemy('level5')
      spawnEnemy('level6')
    } else if (killsWithMod >= 380 && killsWithMod < 540) {
      mobSpawnCooldown = 14
      spawnEnemy("level3")
    } else if (killsWithMod >= 540 && killsWithMod < 550) {
      mobSpawnCooldown = 150
      spawnEnemy("boss1")
    } else if (killsWithMod >= 550 && killsWithMod < 650) {
      mobSpawnCooldown = 15
      spawnEnemy("level6")
    } else if (killsWithMod >= 650 && killsWithMod < 800) {
      mobSpawnCooldown = 120
      spawnEnemy("level6")
      spawnEnemy("level7")
      spawnEnemy('level5')
      spawnEnemy('level4')
      spawnEnemy('level3')
      spawnEnemy('level3')
      spawnEnemy('level2')
      spawnEnemy('basic')
    } else if (killsWithMod >= 800 && killsWithMod < 1100){
      mobSpawnCooldown = 15
      spawnEnemy("level6")
      spawnEnemy("level7")
    } else if (killsWithMod > 1100){
      mobSpawnCooldown = 24
      spawnEnemy("level6")
      spawnEnemy("level7")
      spawnEnemy("level8")
    }
  }

  rocketCooldown--;
  if (coins >= coinsToUpgrade) {
    coins -= coinsToUpgrade
    let increaseAmount = totalUpgradesCompleteed/10 +1
    coinsToUpgrade += increaseAmount
    totalUpgradesCompleteed+= 1
    displayUpgrades()
  }

  for (box of boxes) {
    if (inRange(player, box, 20)) {
      let roll = Math.floor(Math.random()*3)
      boxes.splice(boxes.indexOf(box), 1)
      switch (roll) {
        case 0:
          for (let c = CoinsOnGround.length - 1; c >= 0; c --) {
            coin = CoinsOnGround[c]
            CoinsOnGround.splice(c, 1)
            coins+= coin.value
          }
          
          document.querySelector('#gameText').innerText = `Magnet!`
          clearText()
          break;
        case 1:
          health += Math.round(MaxHealth/3)
          document.querySelector('#gameText').innerText = `Foooooood`
          if (health >MaxHealth) health = MaxHealth;
          clearText()
          break;
        case 2:
          let currentCoins = Number(localStorage.getItem('killCoins')) || 0;
          let earnedCoins = Math.floor(Math.random()*17);
          let totalCoins = currentCoins + earnedCoins;

          document.querySelector('#gameText').innerText = `Earned ${earnedCoins} kill coins`
          clearText()
          
          localStorage.setItem('killCoins', String(totalCoins));
          break;
      }
    }
  }

  if (rocketFacts.cooldown !== Infinity && rocketCooldown <= 0) {

    let target = getClosestMob();

    let dx = player.x - target.x;
    let dy = player.y - target.y;

    let tdx = (player.x - target.x)/ Math.sqrt(dx * dx + dy * dy)
    let tdy = (player.y - target.y)/ Math.sqrt(dx * dx + dy * dy)

    if (target) {
      rockets.push({
        x: player.x,
        y: player.y,
        dx: tdx,
        dy: tdy,
        size: rocketFacts.explosionMod,
        photo: rocketIMG
      }); 

      rocketCooldown = rocketFacts.cooldown;
    }
  }

  for (let r = rockets.length - 1; r >= 0; r--) {

    let rocket = rockets[r];

    if (!rocket) continue;

    rocket.x -= rocket.dx * rocketFacts.speed;
    rocket.y -= rocket.dy * rocketFacts.speed;

    for (let e = enemies.length - 1; e >= 0; e--) {
      let enemy = enemies[e];

      if (bulletHitsEnemy(rocket, enemy)) {

        const timeAfterHit = rocketFacts.explosionMod*6.5

        enemy.health -= (rocketFacts.damage*60)/timeAfterHit;

        rocket.photo = boom

        if (enemy.health <= 0) {
          enemies.splice(e, 1);
          kills += 1;
          dropXP(enemy)
        }

        setTimeout(()=>{
          rockets.splice(r, 1);
        }, timeAfterHit)

        
        break;
      }
    }
  }
  
  if ( bulletCooldown <= 0) {
    bulletCooldown = Math.max(bulletCooldownMax, 2)
    shootBullet()
    const timeDelay = 150 - bulletCooldownMax/2
    setTimeout(() => {
      if(bulletFireAmount > 1) {
        shootBullet()
        setTimeout(() => {
        if(bulletFireAmount > 2) {
          shootBullet()
          setTimeout(() => {
          if(bulletFireAmount > 3) {
            shootBullet()
            setTimeout(() => {
              if(bulletFireAmount > 4) {
                shootBullet()
                setTimeout(() => {
                if(bulletFireAmount > 5) {
                  shootBullet()
            }}, timeDelay);
          }}, timeDelay);
        }}, timeDelay);
      }}, timeDelay);
    }}, timeDelay);
    
  }
  
  for (let i = enemies.length - 1; i >= 0; i--) {
    let enemy = enemies[i];

    let dx = player.x - enemy.x;
    let dy = player.y - enemy.y;

    let dist = Math.sqrt(dx * dx + dy * dy);
    if (enemy.health <= 0) {
      enemies.splice(enemies.indexOf(enemy), 1);
      kills += 1;
      dropXP(enemy)
    }

    if (dist > 0) {
      dx /= dist;
      dy /= dist;

      enemy.x += dx * MobSpeed;
      enemy.y += dy * MobSpeed;
    }

    for (let j = 0; j < enemies.length; j++) {
      if (i === j) continue;
      let other = enemies[j];
      let dx2 = enemy.x - other.x;
      let dy2 = enemy.y - other.y;
      let dist2 = Math.sqrt(dx2 * dx2 + dy2 * dy2);
      let minDist = (enemy.size + other.size) / 2;
      if (dist2 < minDist && dist2 > 0) {
        dx2 /= dist2;
        dy2 /= dist2;
        let push = (minDist - dist2) * 0.1;
        enemy.x += dx2 * push;
        enemy.y += dy2 * push;
      }
    }

    if (inRange(player, enemy, forceFieldRange)) {
      enemy.health -= forcePower * Number(localStorage.getItem('forceMod'));

      if (enemy.health <= 0) {
        enemies.splice(i, 1);
        kills += 1;

        dropXP(enemy)

        continue;
      }
    }

    if (
      player.x < enemy.x + enemy.size &&
      player.x + 30 > enemy.x &&
      player.y < enemy.y + enemy.size &&
      player.y + 30 > enemy.y
    ) {
      health -= 1;

      if (health <= 0) {
        localStorage.setItem('currentScore', kills);
        window.location.href = "death.html";
      }
    }
  }

  for(ball of balls){
      
    ball.x += ball.dx*(player.speed+3);
    ball.y += ball.dy*(player.speed+3);

    if (ball.x + ball.size > scrollX + canvas.width) {
      ball.x = scrollX + canvas.width - ball.size-15;
      ball.dx *= -1;
    }

    if (ball.x < scrollX) {
      ball.x = scrollX+15;
      ball.dx *= -1;
    }

    if (ball.y + ball.size > scrollY + canvas.height) {
      ball.y = scrollY + canvas.height - ball.size;
      ball.dy *= -1;
    }

    if (ball.y < scrollY) {
      ball.y = scrollY;
      ball.dy *= -1;
    }

    for (let ball1 of balls) {
      if (ball1 === ball) {
        continue;
      }
      if (ball.x === ball1.x && ball.y === ball.y) {
        balls.splice(balls.indexOf(ball), 1)
        balls.push({x: player.x, y: player.y, dx: -0.64278760968, dy: 0.76604444311, size: ballsFacts.size})
      }
    }

    for (let e = enemies.length - 1; e >= 0; e--) {

      let enemy = enemies[e];

      if (bulletHitsEnemy(ball, enemy)) {
        ball.dx = -ball.dx
        ball.dy = -ball.dy

        enemy.health -= ballsFacts.damage;

        if (enemy.health <= 0) {
          enemies.splice(e, 1);
          kills += 1;
          dropXP(enemy);
        }
      }
    }
  }

  for(ball of drills){
      
    ball.x += ball.dx*5;
    ball.y += ball.dy*5;

    if (ball.x + ball.size > scrollX + canvas.width) {
      ball.x = scrollX + canvas.width - ball.size-15;
      ball.dx *= -1;
    }

    if (ball.x < scrollX) {
      ball.x = scrollX+15;
      ball.dx *= -1;
    }

    if (ball.y + ball.size > scrollY + canvas.height) {
      ball.y = scrollY + canvas.height - ball.size;
      ball.dy *= -1;
    }

    if (ball.y < scrollY) {
      ball.y = scrollY;
      ball.dy *= -1;
    }

    for (let ball1 of drills) {
      if (ball1 === ball) {
        continue;
      }
      if (ball.x === ball1.x && ball.y === ball.y) {
        drills.splice(drills.indexOf(ball), 1)
        drills.push({x: player.x, y: player.y, dx: -0.64278760968, dy: 0.76604444311, size: ballsFacts.size})
      }
    }

    for (let e = enemies.length - 1; e >= 0; e--) {

      let enemy = enemies[e];

      if (bulletHitsEnemy(ball, enemy)) {

        enemy.health -= 0.3;

        if (enemy.health <= 0) {
          enemies.splice(e, 1);
          kills += 1;
          dropXP(enemy);
        }
      }
    }
  }
  
  
  for (let i = bullets.length - 1; i >= 0; i--) {
    bullet = bullets[i]
    bullet.x += bullet.dx * bulletSpeed
    bullet.y += bullet.dy * bulletSpeed
    if (Math.abs(player.x - bullet.x) > 2000 || Math.abs(player.y - bullet.y) > 2000) {
      bullets.splice(i, 1)
    }
    for (let e = 0; e < enemies.length; e ++) {
      enemy = enemies[e]
      if (bulletHitsEnemy(bullet, enemy)) {
        bullets.splice(i, 1)
        enemy.health -= bulletPower
        playMobHurtSound();
        if (enemy.health <= 0) {
          enemies.splice(e, 1);
          kills +=1
          dropXP(enemy)
        }
      }
    }
  }

  for (let i = 0; i < CoinsOnGround.length; i ++){
    coin = CoinsOnGround[i]
    if ((coin.x - player.x)*(coin.x - player.x)+(coin.y - player.y)*(coin.y - player.y) < magnetRange*magnetRange) {
      CoinsOnGround.splice(i, 1)
      playCollectSound();
      coins+= coin.value

    }

  }
  
  player.x += player.dx
  for (let wall of walls) {
    if (player.x < wall.x + wall.width && player.x + 30 > wall.x && player.y < wall.y + wall.height && player.y + 30 > wall.y) {
      player.x -= player.dx;
    }
  }
  
  player.y += player.dy
  for (let wall of walls) {
    if (player.x < wall.x + wall.width && player.x + 30 > wall.x && player.y < wall.y + wall.height && player.y + 30 > wall.y) {
      player.y -= player.dy;
    }
  }
  
  scrollX = player.x - 0.5*canvas.width;
  scrollY = player.y - 0.5*canvas.height;
  if (kills > mostKills) {
    mostKills = kills;
    localStorage.setItem("mostKills", mostKills);
  }

  localStorage.setItem("mostKillsWithMod", String(Number(localStorage.getItem('killModifyer')) +Number(localStorage.getItem('mostKills'))));
  
};
let pattern;

sky.onload = () => {

    const patternCanvas = document.createElement('canvas');
    patternCanvas.width = 21;
    patternCanvas.height = 21;

    const patternCtx = patternCanvas.getContext('2d');

    patternCtx.drawImage(sky, 0, 0, 21, 21);

    pattern = ctx.createPattern(patternCanvas, 'repeat');
};


function draw() {
    
    //ctx.drawImage(pausedIMG, 0, 0, canvas.width, canvas.height)

    ctx.save();
    if (isPaused) return;
    
    ctx.translate(-scrollX, -scrollY);
    
    ctx.fillStyle = pattern;
    ctx.fillRect(scrollX, scrollY, canvas.width, canvas.height);

    ctx.drawImage(forceField, player.x-forceFieldRange/2+15, player.y-forceFieldRange/2+15, forceFieldRange, forceFieldRange);
    ctx.drawImage(playerImg, player.x, player.y, 30, 30);

    
    //ctx.fillStyle = '#287271';
    //ctx.fillRect(20, 20, 40, 40);
    
    walls.forEach(wall => {
      for (let b = 0; b < wall.width; b += 10) {
        for (let d = 0; d < wall.height; d += 10) {
          ctx.drawImage(brick, wall.x + b, wall.y+d, 10, 10);
        }
      }
    });
    
    bullets.forEach(bullet => {
        ctx.drawImage(bulletIMG, bullet.x, bullet.y, bulletSize, bulletSize);
    });

    balls.forEach(ball => {
      ctx.drawImage(soccorBallIMG, ball.x, ball.y, ball.size, ball.size);
    });

    drills.forEach(drill => {
      ctx.drawImage(drillIMG, drill.x, drill.y, 20, 20);
    });

    boxes.forEach(box => {
        ctx.drawImage(boxIMG, box.x, box.y, 20, 20);
    });

    rockets.forEach(rocket => {
        ctx.drawImage(rocket.photo, rocket.x, rocket.y, rocketFacts.explosionMod, rocketFacts.explosionMod);
    });
    
    enemies.forEach(enemy => {
        if (!inRange(player, enemy, canvas.width+100)) return;
        ctx.drawImage(enemy.image, enemy.x, enemy.y, enemy.size, enemy.size);
    });

    CoinsOnGround.forEach(coin => {
        ctx.drawImage(coinImg, coin.x, coin.y, Math.min(5+(coin.value)*2, 60), Math.min(5+(coin.value)*2, 60));
    });
    
    
    
    ctx.restore(); 
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
    
}

loop();
</script>
