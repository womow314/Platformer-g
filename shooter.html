<!DOCTYPE html>
<html>
<head>
    <title>Games.io | Shooter</title>
    <link rel="stylesheet" href="styles1.css" />
</head>
<body>
<canvas id="gameCanvas" height="400" width="800"></canvas>
<button onclick="home()" id="home">Home</button>
<div id="stuff">
  <p id="cord">x: 0, y: 0</p>

  <button onclick="pause()" id="pauseButton">Pause</button>
  
  <details>
    <summary>Show Stats</summary>
    <p id="statsSpeed">Speed: 5</p>
    <p id="statsCooldown">Bullet cooldown: 60</p>
    <p id="statsPower">Bullet power: 1</p>
    <p id="statsSize">Bullet size: 10</p>
    <p id="statsBulletSpeed">Bullet speed: 10</p>
    <p id="statsMagnet">Magnet range: 30</p>
  </details>
</div>
<div id="shop">
  <button id="buy1" onclick="buy(1)">Wait for upgrade</button>
  <button id="buy2" onclick="buy(2)">Wait for upgrade</button>
  <button id="buy3" onclick="buy(3)">Wait for upgrade</button>
</div>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
  
let mostKills = 0;
let magnetRange = 30;


try {
  mostKills = Number(localStorage.getItem("mostKills")) || 0;
} catch (e) {
  mostKills = 0;
}

function pause() {
  isPaused = !isPaused;
  canvas.style.opacity = '1';
  document.querySelector('#pauseButton').innerText = "Pause";
  if (isPaused) canvas.style.opacity = '0.3';
  if (isPaused) document.querySelector('#pauseButton').innerText = "Paused";
}
let isPaused = false

const brick = new Image();
brick.src = "pixil-frame-0%20(4).png";

let sky = new Image();
sky.src = "pixil-frame-0%20(10).png";


let playerImg = new Image();
playerImg.src = "pixil-frame-0%20(1).png";

let enemyBasic = new Image();
enemyBasic.src = "pixil-frame-0%20(12).png";

let enemyLevel2 = new Image();
enemyLevel2.src = "pixil-frame-0%20(14).png"

let enemyLevel3 = new Image();
enemyLevel3.src = "pixil-frame-0%20(15).png"

let enemyLevel4 = new Image();
enemyLevel4.src = "pixil-frame-0%20(16).png"

const bulletIMG = new Image();
bulletIMG.src = "Screen Shot 2026-05-04 at 2.50.58 PM.png";

const pausedIMG = new Image();
pausedIMG.src = "Screen Shot 2026-05-05 at 8.37.53 AM.png"

const coinImg = new Image();
coinImg.src = "pixil-frame-0%20(17).png"

let kills = 0;
let CoinsOnGround = []

let coinsToUpgrade = 2;


let upgrades = {
    power: 1,
    speed: 1,
    size: 1,
    cooldown: 1,
    playerSpeed: 1,
    magnet: 1

}

let upgradeText = {
    power: ['Increase power +1', 'Increase power +2', 'Increase power +3', 'Increase power +4', 'Increase power +5'],
    speed: ['Increase bullet speed 10%', 'Increase bullet speed 20%', 'Increase bullet speed 30%', 'Increase bullet speed 40%', 'Increase bullet speed 50%'],
    size: ['Increase bullet size 10 => 12', 'Increase bullet size 12 => 14', 'Increase bullet size 14 => 16', 'Increase bullet size 16 => 18', 'Increase bullet size 18 => 20' ],
    cooldown: ['Decrease bullet cooldown 10 ticks', 'Decrease bullet cooldown 20 ticks', 'Decrease bullet cooldown 30 ticks', 'Decrease bullet cooldown 40 ticks', 'Decrease bullet cooldown 50 ticks'],
    playerSpeed: ['Player Speed 5 => 6', 'Player Speed 6 => 7', 'Player Speed 7 => 8', 'Player Speed 8 => 9', 'Player Speed 9 => 10'],
    magnet: ['Increase magnet range 30 => 50', 'Increase magnet range 50 => 70', 'Increase magnet range 70 => 90', 'Increase magnet range 90 => 110', 'Increase magnet range 110 => 130']

}

let upgradeArray = ['power', 'speed', 'size', 'cooldown', 'playerSpeed', 'magnet']
let avaibleUpgrades = []

function displayUpgrades() {
  let randomChoice = Math.floor(Math.random()*upgradeArray.length)
  let upgrade1 = upgradeArray[randomChoice]
  while (upgrades.upgrade1 >5){
    let randomChoice = Math.floor(Math.random()*upgradeArray.length)
    let upgrade1 = upgradeArray[randomChoice]
  }
  let upgrade1Text = upgradeText[upgrade1][upgrades[upgrade1]-1]
  document.getElementById('buy1').innerText = `${upgrade1Text}`


  randomChoice = Math.floor(Math.random()*upgradeArray.length)
  let upgrade2 = upgradeArray[randomChoice]
  while (upgrade1 === upgrade2 || upgrades.upgrade2 >5) {
    randomChoice = Math.floor(Math.random()*upgradeArray.length)
    upgrade2 = upgradeArray[randomChoice]
  }
  let upgrade2Text = upgradeText[upgrade2][upgrades[upgrade2]-1]
  document.getElementById('buy2').innerText = `${upgrade2Text}`


  randomChoice = Math.floor(Math.random()*upgradeArray.length)
  let upgrade3 = upgradeArray[randomChoice]
  while (upgrade1 === upgrade3 || upgrade2 === upgrade3 || upgrades.upgrade3 >5) {
    randomChoice = Math.floor(Math.random()*upgradeArray.length)
    upgrade3 = upgradeArray[randomChoice]
  }
  let upgrade3Text = upgradeText[upgrade3][upgrades[upgrade3]-1]
  document.getElementById('buy3').innerText = `${upgrade3Text}`

  avaibleUpgrades.push(upgrade1)
  avaibleUpgrades.push(upgrade2)
  avaibleUpgrades.push(upgrade3)

  isPaused = true
  canvas.style.opacity = '0.3'
}

decreaseCooldownCost = 3;

const player = {
  x: 30,
  y: 120,
  dx: 0,
  dy: 0,
  speed: 5,
  currentSpeed: 5,
  direction: "e"
};

enemies = []

function spawnEnemy(type="basic") {
  px = Math.random()*1770-1000
  py = Math.random()*1530 - 770
  while ((px + 45-player.x)*(px+45 -player.x) +(py +45-player.y)*(py+45-player.y) < 40000) {
    px = Math.random()*1770-1000
    py = Math.random()*1530 - 770
  }
  let Ehealth;
  let typeImage;
  let enemySize
  if(type === "basic") {
    Ehealth = 1
    enemySize = 90
    typeImage = enemyBasic
  } else if (type === "level2") {
    Ehealth = 3
    typeImage = enemyLevel2
    enemySize = 30
  } else if (type === "level3") {
    Ehealth = 8
    typeImage = enemyLevel3
    enemySize = 50
  } else if (type === "level4") {
    Ehealth = 16
    typeImage = enemyLevel4
    enemySize = 40
  }
  enemies.push({x:px, y:py, health: Ehealth, image: typeImage, enemyType: type, size: enemySize})
}

spawnEnemy("basic")
spawnEnemy("basic")
spawnEnemy("basic")


keys = {};

let bulletCooldown = 0;
let bulletCooldownMax = 60

function home() {
  window.location.href = "index.html";
} 

function buy(choice) {

  let selectedUpgrade = avaibleUpgrades[choice - 1];

  if (!selectedUpgrade) return;

  switch (selectedUpgrade) {

    case "power":
      bulletPower = 1
      bulletPower += upgrades.power;
      document.getElementById('statsPower').innerText = `Bullet power: ${bulletPower}`
      break;

    case "speed":
      bulletSpeed *= 1.1;
      document.getElementById('statsBulletSpeed').innerText = `Bullet speed: ${Math.round(bulletSpeed)}`
      break;

    case "size":
      bulletSize += 2;
      document.getElementById('statsSize').innerText = `Bullet Size: ${bulletSize}`
      break;

    case "cooldown":
      bulletCooldownMax = Math.max(5, bulletCooldownMax - 10);
      document.getElementById('statsCooldown').innerText = `Bullet cooldown: ${bulletCooldownMax}`
      break;

    case "playerSpeed":
      player.speed += 1;
      document.getElementById('statsSpeed').innerText = `Speed: ${player.speed}`
      break;

    case "magnet":
      magnetRange += 20;
      document.getElementById('statsMagnet').innerText = `Magnet range: ${magnetRange}`
      break;
  }
  document.querySelector('#buy1').innerText = 'Wait for upgrade'
  document.querySelector('#buy2').innerText = 'Wait for upgrade'
  document.querySelector('#buy3').innerText = 'Wait for upgrade'

  upgrades[selectedUpgrade] += 1;
  avaibleUpgrades = []

  isPaused = false
  canvas.style.opacity = '1'
}

window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

window.addEventListener("keydown", function(e) {
    if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "Space"].indexOf(e.code) > -1) {
        e.preventDefault();
    }
}, false);

window.addEventListener("keydown", function(e) {
    if (["KeyQ"].indexOf(e.code) > -1) {
        pause()
    }
}, false);

let bullets = []
let walls = []
function addBullet (px, py, pdx, pdy) {
  bullets.push({x:px, y:py, dx:pdx, dy:pdy})
}
function addWall(px, py, w, h) {
  walls.push({x:px, y:py, width:w, height:h})
}

addWall(-1500, 800, 2500, 300)
addWall(-1500, -1060, 2500, 300)
addWall(-1500, -800, 500, 1600)
addWall(800, -1000, 500, 2000)



let bulletSpeed = 10
let bulletSize = 10
let increasePowerCost = 5
let mobSpawnCooldown = 300
let MobsOnBoard = 3
let increaseSpeedCost = 5
let coins = 0
let bulletPower = 1

const MobSpeed = 1




function update() {
  document.querySelector("#cord").innerText = `x: ${Math.round(player.x/10)}, y: ${Math.round(0-(player.y/10))}, Enemies on board: ${MobsOnBoard}, Kills: ${kills}, Coins: ${coins}/${coinsToUpgrade}, Most Kills: ${mostKills}`
  if (isPaused) return;
  player.dx = 0; player.dy = 0;
  player.currentSpeed = player.speed
  if(keys['ShiftRight']||keys['ShiftLeft']) player.currentSpeed = player.speed *1.5;
  if (keys['KeyW']||keys['ArrowUp']) {player.dy = -player.currentSpeed; player.direction = "n"}
  if (keys['KeyS']||keys['ArrowDown']) {player.dy = player.currentSpeed; player.direction = "s"}
  if (keys['KeyA']||keys['ArrowLeft']) {player.dx = -player.currentSpeed; player.direction = "e"}
  if (keys['KeyD']||keys['ArrowRight']) {player.dx = player.currentSpeed; player.direction = "w"}
  
  MobsOnBoard = enemies.length
  bulletCooldown -= 1
  mobSpawnCooldown -= 1
  
  if (MobsOnBoard  <= 0) mobSpawnCooldown = 0
  if (mobSpawnCooldown <=0) {
    if (kills <= 20){
      mobSpawnCooldown = 300 - 6*kills
      spawnEnemy("basic")
    } else if (kills > 20 && kills <= 60) {
      mobSpawnCooldown = Math.max(250 - 2*(kills-20), 120)
      spawnEnemy("level2")
      let randomNum = Math.random()
      randomNum -= (kills-20)/13
      if(randomNum < 0.2) spawnEnemy("basic");
      if(randomNum <0.05) spawnEnemy("basic");
    } else if (kills > 60 && kills < 100) {
      mobSpawnCooldown = Math.max(250 - 2*(kills-60), 120)
      spawnEnemy("level3") 
      let randomNum = Math.random()
      randomNum -= (kills-60)/13
      if(randomNum < 0.2) spawnEnemy("basic");
      if(randomNum <0.05) spawnEnemy("level2");
    } else if (kills > 100) {
      mobSpawnCooldown = Math.max(200 - 2*(kills-100), 120)
      spawnEnemy("basic")
      spawnEnemy("basic")
      spawnEnemy("basic")
      let randomNum = Math.random()
      randomNum -= (kills-100)/20
      if(randomNum < 0.4) spawnEnemy("level2");
      if(randomNum <0.1) spawnEnemy("level3");
      if (kills >= 120) spawnEnemy("level4")
    }
  }
  
  if (keys['Space'] && bulletCooldown <= 0) {
    bulletCooldown = Math.max(bulletCooldownMax, 2)
    let pdx;
    let pdy;
    if (player.direction === "e") {
      pdx = 1;
      pdy = 0;
    } else if (player.direction === "n") {
      pdx = 0;
      pdy = -1;
    } else if (player.direction === "s") {
      pdx = 0;
      pdy = 1;
    } else if (player.direction === "w") {
      pdx = -1;
      pdy = 0;
    }
    addBullet(player.x, player.y, pdx, pdy)
  }
  
  for (let enemy of enemies) {
    if (player.x > enemy.x +enemy.size/2) enemy.x += MobSpeed
    if (player.x < enemy.x+enemy.size/2) enemy.x -= MobSpeed
    
    if (player.y > enemy.y+enemy.size/2) enemy.y += MobSpeed
    if (player.y < enemy.y+enemy.size/2) enemy.y -= MobSpeed
  }
  
  for (let i = 0; i < bullets.length; i ++){
    bullet = bullets[i]
    bullet.x -= bullet.dx * bulletSpeed
    bullet.y += bullet.dy * bulletSpeed
    for (let e = 0; e < enemies.length; e ++) {
      enemy = enemies[e]
      if ((enemy.x + enemy.size/2-bullet.x+bulletSize/2)*(enemy.x+enemy.size/2 -bullet.x+bulletSize/2) +(enemy.y +enemy.size/2-bullet.y+bulletSize/2)*(enemy.y+enemy.size/2-bullet.y+bulletSize/2) < (enemy.size/2)*(enemy.size/2)-100) {
        bullets.splice(i, 1)
        enemy.health -= bulletPower
        if (enemy.health <= 0) {
          enemies.splice(e, 1);
          kills +=1
          CoinsOnGround.push({x: enemy.x+enemy.size/2, y: enemy.y+enemy.size/2, value: Math.max(1, Math.round(enemy.health/5))})
        }
      }
    }
  }
  
  for (let e = 0; e < enemies.length; e ++) {
    enemy = enemies[e]
    if (player.x < enemy.x + enemy.size && player.x + 30 > enemy.x && player.y < enemy.y + enemy.size && player.y + 30 > enemy.y) {
      home()
    }
  }
  for (let i = 0; i < CoinsOnGround.length; i ++){
    coin = CoinsOnGround[i]
    if ((coin.x - player.x)*(coin.x - player.x)+(coin.y - player.y)*(coin.y - player.y) < magnetRange*magnetRange) {
      CoinsOnGround.splice(i, 1)
      coins+= coin.value
      if (coins >= coinsToUpgrade) {
        coins = 0
        coinsToUpgrade += 1
        displayUpgrades()
      }

    }

  }
  
  player.x += player.dx
  for (let wall of walls) {
    if (player.x < wall.x + wall.width && player.x + 30 > wall.x && player.y < wall.y + wall.height && player.y + 30 > wall.y) {
      player.x -= player.dx;
    }
  }
  
  player.y += player.dy
  for (let wall of walls) {
    if (player.x < wall.x + wall.width && player.x + 30 > wall.x && player.y < wall.y + wall.height && player.y + 30 > wall.y) {
      player.y -= player.dy;
    }
  }
  
  scrollX = player.x - 400;
  scrollY = player.y - 0.5*canvas.height;
  if (kills > mostKills) {
    mostKills = kills;
    localStorage.setItem("mostKills", mostKills);
  }
  
}


function draw() {
    
    //ctx.drawImage(pausedIMG, 0, 0, canvas.width, canvas.height)

    ctx.save();
    if (isPaused) return;
    
    ctx.translate(
      Math.min(-scrollX),
      Math.max(-scrollY)
    );
    
    for (let b = -2000; b < 2000; b += 20) {
      for (let d = -2000; d < 2000; d += 20) {
        if (player.x > b+500 || player.x <b-500) { continue}
        if (player.y > d+500 || player.y <d-500) { continue}
        ctx.drawImage(sky, b, d, 21, 21);
      }
    }
  
    ctx.drawImage(playerImg, player.x, player.y, 30, 30);

    
    //ctx.fillStyle = '#287271';
    //ctx.fillRect(20, 20, 40, 40);
    
    walls.forEach(wall => {
      for (let b = 0; b < wall.width; b += 10) {
        for (let d = 0; d < wall.height; d += 10) {
          ctx.drawImage(brick, wall.x + b, wall.y+d, 10, 10);
        }
      }
    });
    
    bullets.forEach(bullet => {
        ctx.drawImage(bulletIMG, bullet.x, bullet.y, bulletSize, bulletSize);
    });
    
    enemies.forEach(enemy => {
        ctx.drawImage(enemy.image, enemy.x, enemy.y, enemy.size, enemy.size);
    });

    CoinsOnGround.forEach(coin => {
        ctx.drawImage(coinImg, coin.x, coin.y, 8,8);
    });
    
    
    
    ctx.restore(); 
}

function loop() {
    update();
    draw();
    setTimeout(() => {
    requestAnimationFrame(loop);
  }, 5);
    
}

loop();
</script>
</body>
</html>
