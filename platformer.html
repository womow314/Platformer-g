<!DOCTYPE html>
<html>
<head>
    <title>Games.io |Platformer</title>
    <link rel="stylesheet" href="styles1.css" />
</head>
<body>
<div id="instructions">
  Arrow right/left = Move ←→ <br>Up arrow/space = jump ⤒ <br>Shift = sprint⚡. <br><br> Brick is normal platform <br>Lava is death <br>Slime is bouncy platform <br>Water is reverse gravity <br>Orange dudes shoot bullets
</div>
<canvas id="gameCanvas" height="400" width="800"></canvas>
<div id="stuff">
  <p id="cord">x: 0, y: 0</p>
  <select id="levelSelect">
    <option value="1">Level 1</option>
    <option value="2">Level 2</option>
    <option value="3">Level 3</option>
    <option value="4">Level 4</option>
    <option value="5">Level 5</option>
    <option value="6">Level 6</option>
    <option value="7">Level 7</option>
    <option value="8">Level 8</option>
    <option value="9">Level 9</option>
    <option value="10">Level 10</option>
    <option value="11">Level 11</option>
    <option value="12">Level 12</option>
    <option value="13">Level 13</option>
    <option value="14">Level 14</option>
    <option value="15">Level 15</option>
    <option value="16">Level 16</option>
    <option value="17">Level 17</option>
    <option value="18">Level 18</option>
    <option value="19">Level 19</option>
    <option value="20">Level 20</option>
    <option value="21">Level 21</option>
    <option value="22">Level 22</option>
    <option value="23">Level 23</option>
    
  </select>
  <button onclick="redo()">Change level</button>
  <button onclick="home()" id="home">Home</button>
  <button onclick="changeBackground()" id="background">Sky</button>
  <button onclick="destroy()">Destroy save</button>
  
  <div id="mobileControls">
    <button id="left">←</button>
    <button id="right">→</button>
    <button id="jump">⤒</button>
    <button id="dash">⚡</button>
  </div>
</div>
<script>
  
function home() {
  window.location.href = "index.html";
}  
window.addEventListener("keydown", function(e) {
    if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "Space"].indexOf(e.code) > -1) {
        e.preventDefault();
    }
}, false);

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let gravity = 1;
let highScore = 0;
let imagesLoaded = 0;
const totalImages = 2;

document.body.addEventListener('touchmove', e => {
  e.preventDefault();
}, { passive: false });

function bindButton(id, key) {
  const btn = document.getElementById(id);

  btn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    keys[key] = true;
  }, { passive: false });

  btn.addEventListener('touchend', (e) => {
    e.preventDefault();
    keys[key] = false;
  });

  // ALSO support mouse (for testing on desktop)
  btn.addEventListener('mousedown', () => keys[key] = true);
  btn.addEventListener('mouseup', () => keys[key] = false);
}

bindButton("left", "ArrowLeft");
bindButton("right", "ArrowRight");
bindButton("jump", "Space");
bindButton("dash", "ShiftLeft");

const keys = {};
const brick = new Image();

brick.src = "pixil-frame-0%20(4).png";

let playerImg = new Image();
playerImg.src = "pixil-frame-0%20(1).png";

const death = new Image();

death.src = "pixil-frame-0%20(5).png";

const water = new Image();

water.src = "pixil-frame-0%20(6).png";


const slime = new Image();

slime.src = "pixil-frame-0%20(11).png"

let sky = new Image();

sky.src = "pixil-frame-0%20(3).png";

let isCaveBackground = true

const cannon = new Image();
cannon.src = "pixil-frame-0%20(2).png";

const playerLauncher = new Image();
playerLauncher.src = "pixil-frame-0 (18).png";

const portalIMG = new Image();
portalIMG.src = "pixil-frame-0-2.png";



const bulletIMG = new Image();
bulletIMG.src = "Screen Shot 2026-05-04 at 2.50.58 PM.png";

function changeBackground() {
  if (isCaveBackground) {
    sky.src = "Screen%20Shot%202026-04-24%20at%2012.34.40%20PM.png";
    isCaveBackground = false
    document.querySelector('#background').innerText = 'Cave'
  }
  else {
    sky.src = "pixil-frame-0%20(3).png";
    isCaveBackground = true
    document.querySelector('#background').innerText = 'Sky'
  }
}
let portals = []

function destroy () {
  document.getElementById('levelSelect').value = printLevel
  redo()
}

const player = {
    x: 50,
    y: -950,
    width: 30,
    height: 30,
    dx: 0,  
    dy: 0, 
    speed: 7,
    jumpPower: -15,
    grounded: false
};
let scrollX = 0;
scrollX = player.x - 400;
let scrollY = 0;
scrollY = player.y - 200;

let platforms = [];
let dangers = [];
let enemys = [];
let thickness = 20
let currentX = 100;
let deathNum = 0;
let currentY = 300;
let save = {
  x: 50,
  y: -950
}
let cooldown = false
let dashCooldown = 0; 
let level = 1;
let printLevel = 1;
const DASH_DURATION = 1;

function redo(){
  level = parseInt(document.getElementById('levelSelect').value);
  printLevel = level
  generateWorld()
  save = { x: 50, y: -950 };
  
}

let end = {
  x: 0,
  y: 0
}

const levelsNum = 23

function generateWorld() {
  currentX = 100; 
  portals = []
  currentY = -1000;
  highScore = 0
  dangers = []
  save = {
    x: 50,
    y: -950
  }
  
  platforms = []
  enemys = []
  bullets = []
  addPlatform(-40, -900, 140, 20)
  addPlatform(-500, 380, 40000, 20, true)
  player.x = 50;
  player.y = -950;
  player.dy = 0;
  for (let i = 0; i < (levelsNum + 1 - printLevel) * 10; i++) {
      let roll = Math.floor(Math.random() * level)
      let isBouncy = Math.random() > 0.85
      let width = Math.random() * 120 + 80;
      
      if (i % 10 === 0) {
        if (i != 0){
          level ++;
          addPlatform(currentX, currentY-2500, 10, 5000, false, false, false, true);
        }
        roll = level-1
      }
      
      if (roll === 0) { //Level 1
        width += 80
        addPlatform(currentX, currentY, width, thickness, false, isBouncy);
        if (isBouncy) currentY -= 100;
        
      } else if (roll === 1) { //Level 2
        addPlatform(currentX, currentY, width, thickness, false, isBouncy);
        if (isBouncy) currentY -= 100;
        
      } else if (roll === 2){ //Level 3
        width+= 80
        addPlatform(currentX, currentY, width, thickness, false, isBouncy); 
        const height = Math.floor(Math.random()*3) +1
        for (let i = 1; i <= height; i ++){
          addPlatform(currentX + width/2-10, currentY - i*20, 20, thickness, true); 
        }
        
      } else if (roll === 3){ //Level 4
        width += Math.random() * 60
        width = Math.max(width, 150)
        addPlatform(currentX, currentY, width, thickness, false, isBouncy); 
        addPlatform(currentX +50, currentY -thickness*3, width -100, thickness, true); 
        
      } else if (roll === 4){ //Level 5
        addPlatform(currentX, currentY, width, thickness, false, isBouncy); 
        addPlatform(currentX, currentY -thickness*3, width, thickness, false, isBouncy); 
        addPlatform(currentX, currentY -thickness*6, width, thickness, false, isBouncy); 
        addPlatform(currentX, currentY -thickness*9, width, thickness, false, isBouncy); 
        addPlatform(currentX, currentY -thickness*12, width, thickness, false, isBouncy); 
        currentY -= thickness*12
        
      } else if (roll === 5){ //Level 6
        width += Math.random() * 100
        width = Math.max(width, 250)
        addPlatform(currentX, currentY+80, 100, thickness); 
        addPlatform(currentX+30, currentY, width, thickness, false, true); 
        addPlatform(currentX+30, currentY-100, width/3, thickness, true); 
        addPlatform(currentX+width/3+30, currentY-100, width/3, thickness, false, isBouncy);
        addPlatform(currentX+width-20, currentY-120, 20, thickness, false, isBouncy); 
        addPlatform(currentX+width*2/3+30, currentY-100, width/3, thickness, true); 
        currentY -= 100
        width += 20
        
      } else if (roll === 6){ //Level 7
        if (currentY < 100){
          width += 200  
          addPlatform(currentX-50, currentY, 50, thickness); 
          addPlatform(currentX+width, currentY+75, 350, thickness); 
          addPlatform(currentX+width, currentY-75, 350, thickness); 
          addPlatform(currentX, currentY-100, width, thickness, true); 
          addPlatform(currentX, currentY+100, width, thickness, true); 
          width += 350
          currentY += 25
        } else  {
          addPlatform(currentX, currentY, width, thickness, false, isBouncy);
          if (isBouncy) currentY -= 100
        }
        
      } else if (roll === 7){ //Level 8
        width = 60
        addPlatform(currentX, currentY-200, width, 300, false, false, true); 
        addPlatform(currentX, currentY-220, width, thickness, false, isBouncy)
        currentX += 20
        currentY -= 60
        
      } else if (roll === 8){ //Level 9
        width += Math.random() * 200
        currentX += 30
        currentY -= 80
        addPlatform(currentX, currentY, width,4000, false, false, true); 
        addPlatform(currentX, currentY -20, width,thickness, false, isBouncy); 
        addPlatform(currentX, currentY -40, width,thickness, true); 
        const height = Math.floor(Math.random()*5) +1
          for (let i = 0; i <= height; i ++){
            addPlatform(currentX + width/2-10, currentY + i*20, 20, thickness, true); 
          }
        addPlatform(currentX+width, currentY +60, width,thickness); 
        width += width
        currentY += 30
        
      } else if (roll === 9){ //Level 10
        width = 0
        currentX -= 60
        currentY -= 10
        addPlatform(currentX, currentY-2000, 2000, 20, true); 
        addPlatform(currentX, currentY-2000, 2000,4000, false, false, true); 
        
      } else if (roll === 10){ //Level 11
        addPlatform(currentX, currentY, width, thickness, false, isBouncy);
        SpawnEnemy(currentX, currentY-30);
        
      } else if (roll === 11){ //Level 12
        if (currentY < -thickness*12){
          addPlatform(currentX, currentY, width, thickness); 
          addPlatform(currentX, currentY +thickness*3, width, thickness); 
          addPlatform(currentX, currentY +thickness*6, width, thickness); 
          addPlatform(currentX, currentY +thickness*9, width, thickness); 
          addPlatform(currentX, currentY +thickness*12, width+100, thickness); 
          currentY += thickness*12
          currentX += 100
        }
        else {
          addPlatform(currentX, currentY, width, thickness, false, isBouncy);
          if (isBouncy) currentY -= 100
        }
        
      } else if (roll === 12) { //Level 13 
        width = 60
        addPlatform(currentX, currentY-400, width, 500, false, false, true); 
        addPlatform(currentX, currentY-420, width, thickness, true)
        currentX += 20
        currentY -= 60
      
      } else if (roll === 13) { //Level 14
        let dir = 1;
        for (let j = 0; j < 6; j++) {
          addPlatform(currentX + dir*80, currentY - j*70, 80, thickness, false, isBouncy);
          dir *= -1;
        }
        addPlatform(currentX + dir*80, currentY - 6*70, 200, thickness, false, isBouncy);
        addPlatform(currentX,currentY, 200, thickness);
        currentY -= 420;
      
      } else if (roll === 14) { //Level 15
        width = 0
        for (let j = 0; j < 6; j++) {
          addPlatform(currentX + j*60, currentY - j*50, 30, thickness, false, isBouncy);
        }
        currentX += 250;
        currentY -= 300;
      
      } else if (roll === 15) { // Level 16
        addPlatform(currentX, currentY + 40, 400, 40, true);
        for (let j = 0; j < 5; j++) {
          addPlatform(currentX + j*80, currentY - j*40, 60, thickness, false, isBouncy);
        }
        addPlatform(currentX, currentY -250, 400, thickness, false, isBouncy);
        currentX += 300;
        currentY -= 200;
      
      } else if (roll === 16) { // Level 17
        for (let j = 0; j < 4; j++) {
          addPlatform(currentX, currentY - j*160, 100, thickness, false, true);
          if (j % 2 === 0) addPlatform(currentX, currentY - j*160 + 20, 50, thickness, true);
          else addPlatform(currentX+50, currentY - j*160 + 20, 50, thickness, true);
          addPlatform(currentX, currentY -600, 400, thickness, false, isBouncy);
        }
        currentX +=120
        currentY -= 600;
      
      } else if (roll === 17) { //Level 18
        for (let j = 0; j < 4; j++) {
          addPlatform(currentX + j*120, currentY - j*40, 100, thickness, false, isBouncy);
          SpawnEnemy(currentX + j*120 + 50, currentY - j*40 - 30);
        }
        currentX += 200;
        currentY -= 200;
      
      } else if (roll === 18) { //Level 19
        width = 200
        addPlatform(currentX, currentY+60, 200, thickness, false, isBouncy);
        addPlatform(currentX, currentY - 250, 200, 250, false, false, true);
        currentX += 50;
        currentY -= 150;
      
      } else if (roll === 19) { //Level 20
        addPlatform(currentX, currentY, 80, thickness);
        addPlatform(currentX+80, currentY, 400, 300, false, false, true);
        addPlatform(currentX+80+100, currentY, 200, thickness, true);
        addPlatform(currentX+80+100+50, currentY+20, 100, thickness, false, true);
        currentX += 300

      
      }  else if (roll === 20) { // Level 21
        for (let j = 0; j < 5; j++) {
          addPlatform(currentX + j*100, currentY - j*40, 20, thickness, false, isBouncy);
        }
        currentX += 300;
        currentY -= 200;
      
      } else if (roll === 21) { // Level 22
        width = 240
        addPlatform(currentX, currentY, 180, thickness);
        addPortal(currentX+80, currentY-20, 0, -200);
        addPlatform(currentX, currentY-160, 240, thickness, false, isBouncy);
        addPlatform(currentX+160, currentY-180, 20, thickness, true);
        currentY -= 180
    
      } else if (roll === 22) { // Level 23
        width = 480
        addPlatform(currentX, currentY, 180, thickness);
        addPortal(currentX+80, currentY-20, 0, -300);
        addPlatform(currentX, currentY-160, 480, thickness, false, true);
        addPlatform(currentX+160, currentY-180, 20, thickness, true);
        addPlatform(currentX+160, currentY-200, 20, thickness, true);
        addPlatform(currentX+160, currentY-220, 20, thickness, true);
        
        addPlatform(currentX+260, currentY-180, 20, thickness, true);
        addPlatform(currentX+260, currentY-200, 20, thickness, true);
        addPlatform(currentX+260, currentY-220, 20, thickness, true);
        
        addPlatform(currentX+360, currentY-180, 20, thickness, true);
        addPlatform(currentX+360, currentY-200, 20, thickness, true);
        addPlatform(currentX+360, currentY-220, 20, thickness, true);
        
        addPlatform(currentX+460, currentY-180, 20, thickness, true);
        addPlatform(currentX+460, currentY-200, 20, thickness, true);
        addPlatform(currentX+460, currentY-220, 20, thickness, true);
        
        currentY -= 180
    
      } else { // fallback (keep safety)
        addPlatform(currentX, currentY, width, thickness);
      }
      
      currentX += width + Math.random()*100+20
      currentY -= Math.random() * 50 - 20;
  }
  end.x = currentX
  end.y = currentY
}


function SpawnEnemy(px, py) {
  enemys.push({x: px, y: py})
}

function addPlatform(px, py, w, h, danger = false, bouncy = false, isWater = false, checkpoint = false) {
  if (!danger) platforms.push({x: px, y: py, width: w, height: h, b: bouncy, water: isWater, check: checkpoint})
  else dangers.push({x: px, y: py, width: w, height: h})
}


window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

bullets = []

setInterval(() => {
  for (const enemy of enemys) {
    bullets.push({x: enemy.x, y: enemy.y})
  }
}, 4000);
function addPortal (cx, cy, dx, dy) {
    portals.push({x: cx, y:cy, changeX: dx, changeY: dy})
}

function update() {
  
    highScore = Math.max(Math.round(player.x/10), highScore)
    document.querySelector("#cord").innerText = `x: ${Math.round(player.x/10)}, y: ${Math.round(0-((player.y/10)-34))}, Highest score: ${highScore}, Level: ${printLevel}, Deaths: ${deathNum}`
    let moveDir = 0;
    
    for (let i = bullets.length - 1; i >= 0; i--) {
      let b = bullets[i];
      b.x -= 5; 

      if (player.x < b.x + 10 && player.x + player.width > b.x && player.y < b.y + 10 && player.y + player.height > b.y) {
          player.x = save.x; 
          player.y = save.y; 
          deathNum+=1
          player.dy = 0;
          bullets.splice(i, 1); 
          continue;
      }
      if (b.x > player.x + 1600) {
          bullets.splice(i, 1);
      }
    }
    
    if (dashCooldown > 0) dashCooldown-= 1
    
    if (keys['ArrowRight'] || keys['KeyD']) moveDir = 1;
    else if (keys['ArrowLeft'] || keys['KeyA']) moveDir = -1;
    else player.dx = 0;
    
    
    if ((keys['ShiftLeft'] || keys['ShiftRight']) && dashCooldown === 0 ) {
      let dashDir = moveDir === 0 ? 1 : moveDir;
      player.x += 30 * dashDir;
      dashCooldown = DASH_DURATION;
    } else {
      player.dx = moveDir * player.speed;
    }
    if ((keys['ArrowUp'] || keys['Space'] || keys['KeyW']) && player.grounded) {
        if (gravity > 0) player.dy = player.jumpPower;
        else player.dy = player.dy = -player.jumpPower/1.3;
        player.grounded = false;
    }

    player.dy += gravity;
    
    player.x += player.dx;
    player.y += player.dy;

    player.grounded = false;
    gravity = 1
    
    if (player.x < end.x + 50 &&
      player.x + player.width > end.x &&
      player.y < end.y + 50 &&
      player.y + player.height > end.y) {
      document.getElementById('levelSelect').value = 1
      deathNum = 0
      home()
    }
    
    for (let plat of platforms) {
      if (plat.x>player.x+200) {continue;}
        if (player.x < plat.x + plat.width &&
            player.x + player.width > plat.x &&
            player.y < plat.y + plat.height &&
            player.y + player.height > plat.y && !keys['ArrowDown']) {
            if (plat.b) {
              if (gravity > 0){
                if (player.dy > 0 ) {
                  player.dy = -20; 
                  continue;
                }
                continue;
              }
              player.dy = 15; 
              continue;
              
            }
            if (plat.water) {gravity = -0.5; continue;};
            if (plat.check) {printLevel += 1; plat.check = false; save.x = player.x+10; save.y = player.y;};
            if (gravity > 0){

              if (player.dy > 0 && player.y + player.height - player.dy <= plat.y +5) {
                player.y = plat.y - player.height;
                player.dy = 0;
                player.grounded = true;
              }
            } else {
              if (player.dy < 0 && player.y - player.dy >= plat.y + plat.height-5) { 
                player.y = plat.y + plat.height;
                player.dy = 0;
                player.grounded = true;
              }
            }
            
        }
    }
    for (let portal of portals) {
      if (portal.x>player.x+300) {continue;}
        if (player.x < portal.x + 20 &&
            player.x + player.width > portal.x &&
            player.y < portal.y + 20 &&
            player.y + player.height > portal.y) {
            
            player.x += portal.changeX;
            player.y += portal.changeY;
        }
    }
    
    for (let dang of dangers) {
      if (dang.x>player.x+300) {continue;}
        if (player.x < dang.x + dang.width &&
            player.x + player.width > dang.x &&
            player.y < dang.y + dang.height &&
            player.y + player.height > dang.y) {
            
            player.x = save.x;
            player.y = save.y;
            deathNum += 1
            player.dy = 0;
        }
    }

    if (player.y > canvas.height) { 
        player.x = save.x;
        player.y = save.y;
        deathNum += 1
        player.dy = 0;
    }
    scrollX = player.x - 400;
    scrollY = player.y - 0.5*canvas.height;
    
}

function draw() {
    ctx.drawImage(sky, 0, 0, canvas.width, canvas.height);

    ctx.save();
    ctx.translate(
      Math.min(0, -scrollX),
      Math.max(canvas.height-400, -scrollY)
    );

    ctx.fillStyle = '#287271';
    nope = false
    platforms.forEach(plat => {
        if (plat.x>player.x+800) {return;}
        if(plat.b){
          for (let b = 0; b < plat.width; b += 20) {
            ctx.drawImage(slime, plat.x + b, plat.y, 20, plat.height);
          }
          nope = true
        } else if(plat.water){
          for (let b = 0; b < plat.width; b += 20) {
            for (let k = 0; k < plat.height; k += 160) {
              ctx.drawImage(water, plat.x + b, plat.y+k, 20, 160);
            }
          }
          nope = true
        } else if(plat.check){
          ctx.fillStyle = '#87CEEB';
          nope = false
        } else {
          nope = true
          if (plat.height > 60) {
            nope = false
            ctx.fillStyle = '#6792e0';
          }
          for (let b = 0; b < plat.width; b += 10) {
            if (nope) ctx.drawImage(brick, plat.x + b, plat.y, 10, plat.height);
          }
          
        }
        if(!nope) ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
    });
    

    dangers.forEach(plat => {
      for (let b = 0; b < plat.width; b += 10) {
        ctx.drawImage(death, plat.x + b, plat.y, 10, plat.height);
      }
    });
    ctx.fillStyle = '#f4a261';
    enemys.forEach(enemy => {
        ctx.drawImage(cannon, enemy.x, enemy.y, 30, 30);
    });
    
    ctx.fillStyle = '#e76f51';
    bullets.forEach(bullet => {
        ctx.drawImage(bulletIMG, bullet.x, bullet.y, 10, 10);
    });
    
    portals.forEach(portal => {
        ctx.drawImage(portalIMG, portal.x, portal.y-30, 60, 60);
    });

    ctx.drawImage(playerImg, player.x, player.y, player.width, player.height);
    ctx.fillStyle = '#00ffff';
    ctx.fillRect(end.x, end.y, 50, 50);
    
    ctx.restore(); 
}

function loop() {
    update();
    draw();
    setTimeout(() => {
    requestAnimationFrame(loop);
  }, 10);
    
}

generateWorld();
loop();
</script>
</body>
</html>
